{% extends "admin/base.html" %}
{% block content %}

<div class="max-w-6xl mx-auto p-4 sm:p-6">

  <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-6 sm:p-8">

    <h1 class="text-2xl font-semibold mb-6">
      {{ page_title }}
    </h1>

    <form method="POST"
          action="{{ url_for('pets.save_species') }}"
          enctype="multipart/form-data"
          x-data="{
            preview: '{{ url_for('static', filename=species.image_url) if species and species.image_url else '' }}',
            resetPreview() { this.preview = ''; $refs.file.value = '' }
          }"
          class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      {% if species %}
        <input type="hidden" name="species_id" value="{{ species.id }}">
      {% endif %}

      <!-- LEFT COLUMN -->
      <div class="space-y-5">

        <!-- IMAGE UPLOAD -->
        <div>
          <label class="block font-medium mb-1">Image</label>

          <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4">

            <!-- IMAGE PREVIEW (ONLY IF IMAGE EXISTS) -->
            <template x-if="preview">
              <div class="relative w-full sm:w-28 h-40 sm:h-28 border rounded-2xl overflow-hidden bg-gray-50 flex items-center justify-center">
                <img :src="preview" class="w-full h-full object-cover">

                <!-- CLEAR BUTTON -->
                <button type="button"
                        @click="resetPreview()"
                        class="absolute top-2 right-2 bg-white rounded-full p-1 shadow hover:bg-gray-100 transition">
                  <i class="fa-solid fa-xmark text-gray-600"></i>
                </button>
              </div>
            </template>

            <!-- FILE INPUT BUTTON -->
            <label class="flex-1 cursor-pointer bg-white border border-gray-300 rounded-xl px-4 py-2 text-center hover:bg-gray-50 transition">
              <i class="fa-solid fa-upload text-indigo-600 mr-2"></i>
              <span x-text="preview ? 'Change Image' : 'Upload Image'"></span>
              <input type="file" name="image" accept="image/*"
                     class="hidden" x-ref="file"
                     @change="preview = URL.createObjectURL($event.target.files[0])">
            </label>

          </div>
          <p class="text-xs text-gray-500 mt-1">
            Recommended: 400x400px, max 2MB
          </p>
        </div>

        <!-- NAME -->
        <div>
          <label class="block font-medium mb-1">Name</label>
          <input type="text" name="name"
                 class="w-full border rounded-xl px-4 py-2"
                 value="{{ species.name if species }}" required>
        </div>

      </div>

      <!-- RIGHT COLUMN -->
      <div class="space-y-5">

        <!-- DESCRIPTION -->
        <div>
          <label class="block font-medium mb-1">Description</label>
          <textarea name="description"
                    rows="5"
                    class="w-full border rounded-xl px-4 py-2 resize-none"
                    maxlength="100"
                    required>{{ species.description if species }}</textarea>
        </div>

        <!-- LEGAL STATUS -->
        <div>
          <label class="block font-medium mb-1">Legal Status</label>
          <select name="legal_status"
                  class="w-full border rounded-xl px-4 py-2">
            <option value="Allowed"
              {% if species and species.legal_status == 'Allowed' %}selected{% endif %}>
              Allowed
            </option>
            <option value="Permit Required"
              {% if species and species.legal_status == 'Permit Required' %}selected{% endif %}>
              Permit Required
            </option>
          </select>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="flex flex-col sm:flex-row gap-4 pt-4">
          <button type="submit"
                  class="flex-1 bg-indigo-600 hover:bg-indigo-700
                         text-white py-3 rounded-2xl font-semibold">
            {{ 'Update Species' if species else 'Add Species' }}
          </button>

          <a href="{{ url_for('pets.species_index') }}"
             class="flex-1 text-center py-3 rounded-2xl
                    border border-gray-300 text-gray-700">
            Cancel
          </a>
        </div>

      </div>

    </form>
  </div>
</div>

{% endblock %}
