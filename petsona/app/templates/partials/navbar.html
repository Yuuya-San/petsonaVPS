<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>PetSona</title>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --lavender-dark: #7b6fd6;
      --lavender-soft: #f6f5ff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: "Poppins", system-ui, sans-serif;
      background: #fafaff;
    }

    body {
      padding-top: 80px;
    }

    /* ================= NAVBAR ================= */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #ffffff;
      z-index: 1000;
      box-shadow: 0 4px 12px rgba(0,0,0,.06);
      height: 80px;
    }

    .nav-container {
      width: 100%;
      height: 100%;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* BRAND */
    .brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--lavender-dark);
      text-decoration: none;
      white-space: nowrap;
    }

    /* LINKS */
    .nav-links {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 2.5rem;
      margin: 0;
      padding: 0;
    }

    .nav-links a {
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      color: #444;
      position: relative;
      transition: color 0.3s ease;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0;
      height: 2px;
      background: var(--lavender-dark);
      transition: width 0.25s ease;
    }

    .nav-links a:hover {
      color: var(--lavender-dark);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    /* ===== ACTIVE LINK ===== */
    .nav-links a.active {
      color: var(--lavender-dark);
      font-weight: 600;
    }

    .nav-links a.active::after {
      width: 100%;
    }

    /* LOGIN BUTTON */
    .nav-auth a {
      padding: 0.5rem 1.2rem;
      border-radius: 25px;
      background: var(--lavender-soft);
      color: var(--lavender-dark);
      transition: background 0.3s ease, color 0.3s ease;
    }

    .nav-auth a:hover {
      background: var(--lavender-dark);
      color: #fff;
    }

    /* HAMBURGER */
    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .nav-toggle span {
      width: 24px;
      height: 2.5px;
      background: #444;
      display: block;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    /* ================= MOBILE ================= */
    @media (max-width: 768px) {
      body {
        padding-top: 70px;
      }

      .navbar {
        height: 70px;
      }

      .nav-container {
        padding: 0 1rem;
      }

      .brand {
        font-size: 1.2rem;
      }

      .nav-toggle {
        display: flex;
      }

      .nav-links {
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: #ffffff;
        flex-direction: column;
        gap: 0;
        padding: 1rem 0;
        display: none;
        box-shadow: 0 8px 20px rgba(0,0,0,.08);
      }

      .nav-links li {
        width: 100%;
        padding: 0.75rem 1.5rem;
        text-align: center;
      }

      .nav-links a {
        font-size: 0.9rem;
      }

      .nav-links a::after {
        display: none;
      }

      .nav-links a.active {
        background: var(--lavender-soft);
        border-radius: 12px;
      }

      .nav-links.active {
        display: flex;
      }

      .nav-auth {
        padding: 0.75rem 1.5rem;
        border-top: 1px solid #f0f0f0;
        margin-top: 0.5rem;
      }

      .nav-auth a {
        width: 100%;
        display: block;
        text-align: center;
        border-radius: 15px;
        padding: 0.6rem 1rem;
      }
    }

    /* TABLET */
    @media (max-width: 1024px) {
      .nav-links {
        gap: 1.5rem;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-container">

      <a href="{{ url_for('auth.home') }}" class="brand">
        <i class="fas fa-paw"></i> PetSona
      </a>

      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <ul class="nav-links">
        <li>
          <a href="{{ url_for('auth.home') }}"
             class="{% if request.endpoint == 'auth.home' %}active{% endif %}">
            Home
          </a>
        </li>

        <li>
          <a href="{{ url_for('auth.feature') }}"
             class="{% if request.endpoint == 'auth.feature' %}active{% endif %}">
            Features
          </a>
        </li>

        <li>
          <a href="{{ url_for('auth.about') }}"
             class="{% if request.endpoint == 'auth.about' %}active{% endif %}">
            About
          </a>
        </li>

        <li>
          <a href="{{ url_for('auth.contact') }}"
             class="{% if request.endpoint == 'auth.contact' %}active{% endif %}">
            Contact
          </a>
        </li>


        <li class="nav-auth">
          <a href="{{ url_for('auth.login') }}"
             class="{% if request.endpoint == 'auth.login' %}active{% endif %}">
            Login
          </a>
        </li>
      </ul>

    </div>
  </nav>

  <!-- JS -->
  <script>
    const toggle = document.querySelector('.nav-toggle');
    const links = document.querySelector('.nav-links');

    toggle.addEventListener('click', () => {
      links.classList.toggle('active');
    });
  </script>

</body>
</html>
