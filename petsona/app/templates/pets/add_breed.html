{% extends "admin/base.html" %}
{% block title %}Add Breed{% endblock %}
{% block content %}

<h3>Add Breed</h3>

<form method="POST" class="card card-lavender p-4">

  <div class="mb-3">
    <label>Species *</label>
    <select name="species_id" class="form-select" required>
      {% for s in species_list %}
      <option value="{{ s.id }}">{{ s.name }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="mb-3">
    <label>Breed Name *</label>
    <input name="name" class="form-control" required>
  </div>

  <div class="mb-3">
    <label>Summary (1 sentence) *</label>
    <textarea name="summary" class="form-control" required></textarea>
  </div>

  <div class="row">
    <div class="col">
      <label>Energy Level</label>
      <select name="energy_level" class="form-select">
        <option>Low</option><option selected>Medium</option><option>High</option>
      </select>
    </div>
    <div class="col">
      <label>Space Needs</label>
      <select name="space_needs" class="form-select">
        <option>Small</option><option selected>Medium</option><option>Large</option>
      </select>
    </div>
    <div class="col">
      <label>Grooming Needs</label>
      <select name="grooming_needs" class="form-select">
        <option>Low</option><option selected>Medium</option><option>High</option>
      </select>
    </div>
  </div>

  <div class="mb-3 mt-3">
    <label>Personality Traits (comma separated)</label>
    <input name="personality_traits" class="form-control">
  </div>

  <div class="mb-3">
    <label>Monthly Care Cost (₱)</label>
    <input name="care_cost" type="number" step="0.01" class="form-control">
  </div>

  <button class="btn btn-primary">Save Breed</button>
</form>

{% endblock %}
