<!DOCTYPE html>
<html>
<head>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gradient-to-br from-indigo-50 to-purple-100 min-h-screen">

<div x-data="petQuiz()" class="max-w-2xl mx-auto p-8">
  <div class="h-2 bg-gray-200 rounded mb-6">
    <div class="h-2 bg-indigo-500 rounded transition-all"
         :style="`width:${(step/7)*100}%`"></div>
  </div>

  <div class="bg-white p-8 rounded-xl shadow-xl">

    <template x-if="step <= 5">
      <div>
        <h2 class="text-2xl font-bold mb-4" x-text="questions[step-1].q"></h2>
        <template x-for="opt in questions[step-1].o">
          <button @click="select(opt)"
            class="block w-full p-4 mb-3 bg-indigo-100 rounded hover:bg-indigo-200 transition">
            <span x-text="opt.label"></span>
          </button>
        </template>
      </div>
    </template>

    <template x-if="step === 6">
      <div class="text-center animate-pulse">Finding your perfect pet… 🐾</div>
    </template>

    <template x-if="step === 7">
      <div>
        <h2 class="text-2xl font-bold mb-4">Your Matches</h2>
        <template x-for="pet in results">
          <div class="bg-gray-50 p-4 rounded mb-3">
            <div class="flex justify-between">
              <strong x-text="pet.breed.name"></strong>
              <span x-text="pet.score + '%'"></span>
            </div>
            <p class="text-sm text-gray-600" x-text="pet.breed.summary"></p>
          </div>
        </template>
      </div>
    </template>

  </div>
</div>

<script>
function petQuiz() {
  return {
    step: 1,
    results: [],
    profile: {},
    questions: [
      { key: 'time_commitment', q: 'Daily time?', o: [
        {label:'Low', value:'Low'}, {label:'Medium', value:'Medium'}, {label:'High', value:'High'}
      ]},
      { key: 'experience_required', q: 'Experience?', o: [
        {label:'Beginner', value:'Beginner'}, {label:'Intermediate', value:'Intermediate'}, {label:'Advanced', value:'Advanced'}
      ]},
      { key: 'space_needs', q: 'Space?', o: [
        {label:'Small', value:'Small'}, {label:'Medium', value:'Medium'}, {label:'Large', value:'Large'}
      ]},
      { key: 'noise_level', q: 'Noise tolerance?', o: [
        {label:'Low', value:'Low'}, {label:'Moderate', value:'Moderate'}, {label:'Loud', value:'Loud'}
      ]},
      { key: 'has_children', q: 'Children?', o: [
        {label:'Yes', value:true}, {label:'No', value:false}
      ]}
    ],
    select(opt) {
      this.profile[this.questions[this.step-1].key] = opt.value
      this.step++
      if (this.step === 6) this.submit()
    },
    async submit() {
      const r = await fetch('/find-my-pet', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(this.profile)
      })
      this.results = await r.json()
      this.step = 7
    }
  }
}
</script>

</body>
</html>
