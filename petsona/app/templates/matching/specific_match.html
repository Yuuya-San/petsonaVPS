{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto py-12 text-center">
  {% if breed %}
    <div class="p-6 bg-white rounded-xl shadow-md">
      <img src="{{ breed.image_url }}" class="w-48 h-48 mx-auto rounded-full object-cover mb-4">
      <h2 class="text-xl font-semibold">{{ breed.name }}</h2>
      <p>{{ breed.summary }}</p>
      <p class="mt-4 font-semibold text-lg">Compatibility Score: {{ score | round(1) }}%</p>
    </div>
  {% else %}
    <p class="text-gray-500">No compatible pet found.</p>
  {% endif %}
</div>
{% endblock %}
