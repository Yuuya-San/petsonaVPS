{% extends "admin/base.html" %}

{% block title %}Partner Applications - Admin{% endblock %}

{% block content %}
<div x-data="merchantApplications()" @mount="init()" x-cloak class="min-h-screen bg-gradient-to-br from-white via-purple-50 to-white py-8 px-4 sm:px-6 lg:px-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header Section -->
        <div class="mb-12">
            <div class="flex items-center gap-4 mb-3">
                <div class="p-3 bg-gradient-to-br from-purple-600 to-purple-700 rounded-xl shadow-lg">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-4xl font-bold bg-gradient-to-r from-purple-600 to-purple-700 bg-clip-text text-transparent">Partner Applications</h1>
                    <p class="text-gray-600 mt-2">Review and manage merchant partnership applications</p>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="bg-gradient-to-br from-white to-purple-50 rounded-2xl shadow-lg border-2 border-purple-200 p-7 hover:shadow-xl transition-all">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-purple-600 text-sm font-semibold uppercase tracking-wide">Total</p>
                        <p class="text-4xl font-bold text-gray-900 mt-3" x-text="totalStats.total">0</p>
                    </div>
                    <div class="p-4 bg-purple-100 rounded-xl">
                        <svg class="w-8 h-8 text-purple-600" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="bg-gradient-to-br from-white to-amber-50 rounded-2xl shadow-lg border-2 border-amber-200 p-7 hover:shadow-xl transition-all">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-amber-600 text-sm font-semibold uppercase tracking-wide">Pending</p>
                        <p class="text-4xl font-bold text-gray-900 mt-3" x-text="totalStats.pending">0</p>
                    </div>
                    <div class="p-4 bg-amber-100 rounded-xl">
                        <svg class="w-8 h-8 text-amber-600" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="bg-gradient-to-br from-white to-green-50 rounded-2xl shadow-lg border-2 border-green-200 p-7 hover:shadow-xl transition-all">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-green-600 text-sm font-semibold uppercase tracking-wide">Approved</p>
                        <p class="text-4xl font-bold text-gray-900 mt-3" x-text="totalStats.approved">0</p>
                    </div>
                    <div class="p-4 bg-green-100 rounded-xl">
                        <svg class="w-8 h-8 text-green-600" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="bg-gradient-to-br from-white to-red-50 rounded-2xl shadow-lg border-2 border-red-200 p-7 hover:shadow-xl transition-all">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-red-600 text-sm font-semibold uppercase tracking-wide">Rejected</p>
                        <p class="text-4xl font-bold text-gray-900 mt-3" x-text="totalStats.rejected">0</p>
                    </div>
                    <div class="p-4 bg-red-100 rounded-xl">
                        <svg class="w-8 h-8 text-red-600" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Search and Filter Section -->
        <div class="bg-white rounded-2xl shadow-lg border border-purple-100 p-8 mb-10">
            <div class="flex flex-col sm:flex-row gap-6">
                <div class="flex-1">
                    <label class="block text-sm font-semibold text-gray-700 mb-3">Search Applications</label>
                    <div class="relative">
                        <input 
                            type="text" 
                            x-model="searchTerm"
                            placeholder="Search by business name, owner, ID, or location..."
                            class="w-full px-5 py-3 pl-12 border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition-all text-gray-900 placeholder-gray-400"
                        >
                        <svg class="absolute left-4 top-3.5 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </div>
                </div>
                <div class="w-full sm:w-64">
                    <label class="block text-sm font-semibold text-gray-700 mb-3">Filter Status</label>
                    <select 
                        x-model="statusFilter"
                        class="w-full px-5 py-3 border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition-all font-medium"
                    >
                        <option value="all">All Applications</option>
                        <option value="pending">Pending Review</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Applications List -->
        <div x-show="!isLoading" class="space-y-5">
            <template x-for="(app, index) in getFilteredApplications()" :key="app.id">
                <div class="bg-white rounded-2xl shadow-lg hover:shadow-2xl transition-all border-2 border-gray-100 overflow-hidden group"
                     x-data="{}"
                     @click="console.log('Clicked app:', app.id, app.business_name)">
                    <div class="p-7">
                        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-5">
                            <div class="flex-1">
                                <div class="flex items-center gap-4 mb-4">
                                    <div class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider" 
                                        :class="{
                                            'bg-amber-100 text-amber-700': app.status === 'pending',
                                            'bg-green-100 text-green-700': app.status === 'approved',
                                            'bg-red-100 text-red-700': app.status === 'rejected'
                                        }">
                                        <span x-text="app.status"></span>
                                    </div>
                                    <span class="text-xs text-gray-500 font-mono">ID: <span x-text="'MC-2026-' + app.id"></span></span>
                                </div>
                                <h3 class="text-2xl font-bold text-gray-900 mb-3" x-text="app.business_name">Business</h3>
                                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-sm">
                                    <div>
                                        <p class="text-gray-500 text-xs font-semibold uppercase">Submitted By</p>
                                        <p class="text-gray-900 font-medium mt-1" x-text="app.user_name || 'N/A'"></p>
                                    </div>
                                    <div>
                                        <p class="text-gray-500 text-xs font-semibold uppercase">Email</p>
                                        <p class="text-gray-900 font-medium mt-1 break-all" x-text="app.user_email"></p>
                                    </div>
                                    <div>
                                        <p class="text-gray-500 text-xs font-semibold uppercase">Location</p>
                                        <p class="text-gray-900 font-medium mt-1">
                                            <span x-text="app.city || 'N/A'"></span>, <span x-text="app.province || 'N/A'"></span>
                                        </p>
                                    </div>
                                    <div>
                                        <p class="text-gray-500 text-xs font-semibold uppercase">Type</p>
                                        <p class="text-gray-900 font-medium mt-1" x-text="app.business_type"></p>
                                    </div>
                                </div>
                            </div>
                            <button 
                                @click="viewApplication(app)"
                                class="px-6 py-3 bg-gradient-to-r from-purple-600 to-purple-700 text-white rounded-xl font-semibold hover:shadow-lg transition-all hover:from-purple-700 hover:to-purple-800 flex items-center justify-center gap-2 whitespace-nowrap"
                            >
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                                View Details
                            </button>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Empty State -->
            <template x-if="getFilteredApplications().length === 0 && !isLoading">
                <div class="bg-white rounded-2xl shadow-lg p-16 text-center border-2 border-dashed border-purple-200">
                    <svg class="w-20 h-20 text-gray-300 mx-auto mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                    </svg>
                    <h3 class="text-xl font-bold text-gray-900 mb-2">
                        <template x-if="applications.length === 0">No Applications Found</template>
                        <template x-if="applications.length > 0">No Matching Applications</template>
                    </h3>
                    <p class="text-gray-600">
                        <template x-if="applications.length === 0">There are no merchant applications yet. Merchants will appear here when they submit their applications.</template>
                        <template x-if="applications.length > 0">Try adjusting your search or filter criteria to see more results.</template>
                    </p>
                </div>
            </template>
        </div>

        <!-- Loading State -->
        <template x-if="isLoading">
            <div class="bg-white rounded-2xl shadow-lg p-16 text-center">
                <div class="flex flex-col items-center">
                    <div class="animate-spin rounded-full h-16 w-16 border-4 border-purple-200 border-t-purple-600 mx-auto mb-4"></div>
                    <p class="text-gray-600 font-medium">Loading applications...</p>
                    <p class="text-gray-400 text-sm mt-2">Please wait while we fetch the merchant applications from the database.</p>
                </div>
            </div>
        </template>
    </div>

    <!-- Premium Detail Modal -->
    <template x-if="selectedApp">
        <div class="absolute inset-0 bg-black bg-opacity-60 z-40 flex items-center justify-center p-2 sm:p-4 lg:p-6 backdrop-blur-sm" style="position: fixed;" @click.self="selectedApp = null">
            <div class="bg-white rounded-2xl sm:rounded-3xl shadow-2xl w-[calc(100%-16px)] sm:w-[calc(100%-32px)] lg:w-[calc(100%-48px)] max-w-xs sm:max-w-xl lg:max-w-2xl xl:max-w-3xl max-h-[90vh] overflow-hidden flex flex-col" @click.stop>
                
                <!-- Modal Header with Gradient -->
                <div class="sticky top-0 bg-gradient-to-r from-purple-600 via-purple-700 to-purple-800 px-4 sm:px-8 py-4 sm:py-6 flex items-center justify-between z-10 gap-4">
                    <div class="flex items-center gap-2 sm:gap-4 flex-1 min-w-0">
                        <div class="p-2 sm:p-3 bg-white bg-opacity-20 rounded-lg sm:rounded-xl flex-shrink-0 overflow-hidden min-w-fit">
                        <template x-if="selectedApp.logo_url">
                            <img :src="selectedApp.logo_url" alt="Merchant Logo" class="w-10 h-10 sm:w-12 sm:h-12 object-cover rounded" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                            <svg class="w-10 h-10 sm:w-12 sm:h-12 text-white hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </template>
                        <template x-if="!selectedApp.logo_url">
                            <svg class="w-10 h-10 sm:w-12 sm:h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </template>
                    </div>
                        <div class="flex-1 min-w-0">
                            <h2 class="text-lg sm:text-3xl font-bold text-white truncate" x-text="selectedApp.business_name"></h2>
                            <p class="text-purple-100 text-xs sm:text-sm mt-0.5 sm:mt-1 truncate">Submitted by: <span class="font-semibold" x-text="selectedApp.user_email"></span></p>
                        </div>
                    </div>
                    <button 
                        @click="selectedApp = null"
                        class="text-white hover:bg-white hover:bg-opacity-20 p-2 sm:p-3 rounded-lg sm:rounded-xl transition flex-shrink-0"
                    >
                        <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>

                <!-- Modal Content -->
                <div class="overflow-y-auto flex-1">
                    <div class="p-4 sm:p-6 lg:p-8 space-y-6 sm:space-y-8">
                        
                        <!-- Quick Info Bar -->
                        <div class="flex flex-col sm:flex-row gap-3 sm:gap-4">
                            <div class="flex-1 bg-gradient-to-br from-purple-50 to-white border-2 border-purple-200 rounded-lg sm:rounded-xl p-3 sm:p-4">
                                <p class="text-gray-600 text-xs font-semibold uppercase">Status</p>
                                <p class="text-base sm:text-lg font-bold text-gray-900 mt-1 sm:mt-2" 
                                    :class="{
                                        'text-amber-600': selectedApp.status === 'pending',
                                        'text-green-600': selectedApp.status === 'approved',
                                        'text-red-600': selectedApp.status === 'rejected'
                                    }"
                                    x-text="selectedApp.status.charAt(0).toUpperCase() + selectedApp.status.slice(1)"></p>
                            </div>
                            <div class="flex-1 bg-gradient-to-br from-blue-50 to-white border-2 border-blue-200 rounded-lg sm:rounded-xl p-3 sm:p-4">
                                <p class="text-gray-600 text-xs font-semibold uppercase">Submitted</p>
                                <p class="text-xs sm:text-sm font-bold text-gray-900 mt-1 sm:mt-2" x-text="new Date(selectedApp.submitted_at).toLocaleDateString()"></p>
                            </div>
                            <div class="flex-1 bg-gradient-to-br from-indigo-50 to-white border-2 border-indigo-200 rounded-lg sm:rounded-xl p-3 sm:p-4">
                                <p class="text-gray-600 text-xs font-semibold uppercase">Type</p>
                                <p class="text-xs sm:text-sm font-bold text-gray-900 mt-1 sm:mt-2 truncate" x-text="selectedApp.business_type"></p>
                            </div>
                            <div class="flex-1 bg-gradient-to-br from-green-50 to-white border-2 border-green-200 rounded-lg sm:rounded-xl p-3 sm:p-4">
                                <p class="text-gray-600 text-xs font-semibold uppercase">ID</p>
                                <p class="text-xs sm:text-sm font-bold text-gray-900 mt-1 sm:mt-2 font-mono" x-text="'MC-2026-' + selectedApp.id"></p>
                            </div>
                        </div>

                        <!-- Business Information -->
                        <section>
                            <h3 class="text-base sm:text-xl font-bold text-gray-900 mb-3 sm:mb-5 flex items-center gap-2 sm:gap-3">
                                <div class="p-1.5 sm:p-2 bg-purple-100 rounded-lg">
                                    <svg class="w-4 h-4 sm:w-5 sm:h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5.581m0 0H9m5.581 0a2 2 0 100-4 2 2 0 000 4m0 0a2 2 0 100-4 2 2 0 000 4m-6 0a2 2 0 100-4 2 2 0 000 4m0 0H4m9.581 0H9"/>
                                    </svg>
                                </div>
                                Business Details
                            </h3>
                            <div class="bg-gradient-to-br from-gray-50 to-white rounded-lg sm:rounded-2xl border-2 border-gray-100 p-4 sm:p-6 space-y-4 sm:space-y-5">
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6">
                                    <div>
                                        <p class="text-gray-600 text-xs font-semibold uppercase">Business Name</p>
                                        <p class="text-gray-900 font-bold text-sm sm:text-lg mt-1 sm:mt-2" x-text="selectedApp.business_name"></p>
                                    </div>
                                    <div>
                                        <p class="text-gray-600 text-xs font-semibold uppercase">Years in Operation</p>
                                        <p class="text-gray-900 font-bold text-sm sm:text-lg mt-1 sm:mt-2" x-text="selectedApp.years_in_operation || 'N/A'"></p>
                                    </div>
                                </div>
                                <div>
                                    <p class="text-gray-600 text-xs font-semibold uppercase mb-2">Description</p>
                                    <p class="text-gray-900 mt-1 sm:mt-2 leading-relaxed text-xs sm:text-sm" x-text="selectedApp.business_description"></p>
                                </div>
                            </div>
                        </section>

                        <!-- Contact & Location Information -->
                        <section>
                            <h3 class="text-base sm:text-xl font-bold text-gray-900 mb-3 sm:mb-5 flex items-center gap-2 sm:gap-3">
                                <div class="p-1.5 sm:p-2 bg-blue-100 rounded-lg">
                                    <svg class="w-4 h-4 sm:w-5 sm:h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                                    </svg>
                                </div>
                                Contact & Location
                            </h3>
                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6">
                                <div class="bg-gradient-to-br from-gray-50 to-white rounded-lg sm:rounded-2xl border-2 border-gray-100 p-4 sm:p-6 space-y-3 sm:space-y-4">
                                    <h4 class="font-semibold text-gray-900 text-xs sm:text-sm">Contact Details</h4>
                                    <div>
                                        <p class="text-gray-600 text-xs font-semibold uppercase">Owner/Manager</p>
                                        <p class="text-gray-900 font-bold text-xs sm:text-sm mt-1" x-text="selectedApp.owner_name || 'N/A'"></p>
                                    </div>
                                    <div>
                                        <p class="text-gray-600 text-xs font-semibold uppercase">Email</p>
                                        <p class="text-gray-900 font-bold text-xs sm:text-sm mt-1 break-all" x-text="selectedApp.contact_email || 'N/A'"></p>
                                    </div>
                                    <div>
                                        <p class="text-gray-600 text-xs font-semibold uppercase">Phone</p>
                                        <p class="text-gray-900 font-bold text-xs sm:text-sm mt-1" x-text="selectedApp.phone || 'N/A'"></p>
                                    </div>
                                </div>

                                <div class="bg-gradient-to-br from-gray-50 to-white rounded-lg sm:rounded-2xl border-2 border-gray-100 p-4 sm:p-6 space-y-3 sm:space-y-4">
                                    <h4 class="font-semibold text-gray-900 text-xs sm:text-sm">Location Details</h4>
                                    <div>
                                        <p class="text-gray-600 text-xs font-semibold uppercase">Province</p>
                                        <p class="text-gray-900 font-bold text-xs sm:text-sm mt-1" x-text="selectedApp.province || 'N/A'"></p>
                                    </div>
                                    <div>
                                        <p class="text-gray-600 text-xs font-semibold uppercase">City/Municipality</p>
                                        <p class="text-gray-900 font-bold text-xs sm:text-sm mt-1" x-text="selectedApp.city || 'N/A'"></p>
                                    </div>
                                    <div>
                                        <p class="text-gray-600 text-xs font-semibold uppercase">Barangay</p>
                                        <p class="text-gray-900 font-bold text-xs sm:text-sm mt-1" x-text="selectedApp.barangay || 'N/A'"></p>
                                    </div>
                                </div>
                            </div>
                            <div class="mt-4 sm:mt-6 bg-gradient-to-br from-gray-50 to-white rounded-lg sm:rounded-2xl border-2 border-gray-100 p-4 sm:p-6">
                                <p class="text-gray-600 text-xs font-semibold uppercase mb-2">Full Address</p>
                                <p class="text-gray-900 text-xs sm:text-sm leading-relaxed" x-text="selectedApp.full_address || 'N/A'"></p>
                            </div>
                            <div class="mt-3 sm:mt-4 bg-gradient-to-br from-gray-50 to-white rounded-lg sm:rounded-2xl border-2 border-gray-100 p-4 sm:p-6">
                                <p class="text-gray-600 text-xs font-semibold uppercase mb-2">Maps Link</p>
                                <template x-if="selectedApp.google_maps_link">
                                    <a :href="selectedApp.google_maps_link" target="_blank" class="text-blue-600 hover:text-blue-700 font-semibold text-xs sm:text-sm break-all">Open in Google Maps</a>
                                </template>
                                <template x-if="!selectedApp.google_maps_link">
                                    <p class="text-gray-500 text-xs">No maps link provided</p>
                                </template>
                            </div>
                            <div class="mt-3 sm:mt-4 bg-gradient-to-br from-gray-50 to-white rounded-lg sm:rounded-2xl border-2 border-gray-100 p-4 sm:p-6">
                                <p class="text-gray-600 text-xs font-semibold uppercase mb-2">Postal Code</p>
                                <p class="text-gray-900 font-bold text-xs sm:text-sm" x-text="selectedApp.postal_code || 'N/A'"></p>
                            </div>
                        </section>

                        <!-- Services & Operations -->
                        <section>
                            <h3 class="text-base sm:text-xl font-bold text-gray-900 mb-3 sm:mb-5 flex items-center gap-2 sm:gap-3">
                                <div class="p-1.5 sm:p-2 bg-green-100 rounded-lg">

<script>
// Get CSRF token from Flask
function getCSRFToken() {
    // Try to get from meta tag first (if available)
    const token = document.querySelector('meta[name="csrf-token"]');
    if (token) return token.getAttribute('content');
    
    // Fallback: try to get from cookie
    const name = 'csrf_token';
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

function merchantApplications() {
    return {
        applications: [],
        filteredApplications: [],
        selectedApp: null,
        searchTerm: '',
        statusFilter: 'all',
        isLoading: true,
        showConfirmModal: false,
        confirmAction: null,
        confirmTitle: '',
        confirmMessage: '',
        confirmMerchantId: null,
        rejectionReason: '',
        totalStats: {
            total: 0,
            pending: 0,
            approved: 0,
            rejected: 0
        },

        init() {
            console.log('Initializing merchant applications component');
            // Watch for search/filter changes
            this.$watch('searchTerm', () => {
                console.log('Search term changed:', this.searchTerm);
                this.filterApplications();
            });
            this.$watch('statusFilter', () => {
                console.log('Status filter changed:', this.statusFilter);
                this.filterApplications();
            });
            this.loadApplications();
        },

        confirmApprove(merchantId) {
            this.showConfirmModal = true;
            this.confirmAction = 'approve';
            this.confirmTitle = 'Approve Application?';
            this.confirmMessage = 'Are you sure you want to approve this merchant application? This action cannot be undone.';
            this.confirmMerchantId = merchantId;
        },

        confirmReject(merchantId) {
            this.showConfirmModal = true;
            this.confirmAction = 'reject';
            this.confirmTitle = 'Reject Application?';
            this.confirmMessage = 'Are you sure you want to reject this merchant application?';
            this.confirmMerchantId = merchantId;
        },

        async executeConfirmedAction() {
            if (this.confirmAction === 'approve') {
                await this.approveApplication(this.confirmMerchantId);
            } else if (this.confirmAction === 'reject') {
                await this.rejectApplication(this.confirmMerchantId, this.rejectionReason);
            }
            this.showConfirmModal = false;
            this.confirmAction = null;
            this.confirmMerchantId = null;
        },

        cancelConfirm() {
            this.showConfirmModal = false;
            this.confirmAction = null;
            this.confirmMerchantId = null;
            this.rejectionReason = '';
        },

        async loadApplications() {
            this.isLoading = true;
            try {
                console.log('Fetching merchants from API...');
                const response = await fetch('/admin/api/merchants?status=all');
                
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('API Response:', data);
                
                if (data.error) {
                    console.error('API Error:', data.error);
                    alert('Error loading applications: ' + data.error);
                    return;
                }
                
                const merchants = data.merchants || [];
                console.log(`Loaded ${merchants.length} merchants from API`);
                
                if (merchants.length === 0) {
                    console.warn('No merchants returned from API');
                }
                
                // Normalize field names to match template expectations
                this.applications = merchants.map(m => {
                    console.log('Processing merchant:', m.id, m.business_name, m.application_status);
                    return {
                        id: m.id,
                        business_name: m.business_name,
                        business_type: m.business_type,
                        owner_name: m.owner_manager_name,
                        contact_email: m.contact_email,
                        user_email: m.user_email,
                        user_name: m.user_name,
                        phone: m.contact_phone,
                        city: m.city,
                        province: m.province,
                        barangay: m.barangay,
                        postal_code: m.postal_code,
                        full_address: m.full_address,
                        services: m.services_offered,
                        pets_accepted: m.pets_accepted,
                        max_pets_per_day: m.max_pets_per_day,
                        min_price_per_day: m.min_price_per_day,
                        max_price_per_day: m.max_price_per_day,
                        cancellation_policy: m.cancellation_policy,
                        government_id_path: m.government_id_path,
                        business_permit_path: m.business_permit_path,
                        facility_photos_paths: m.facility_photos_paths,
                        submitted_at: m.submitted_at,
                        rejection_reason: m.rejection_reason,
                        years_in_operation: m.years_in_operation,
                        status: m.application_status,
                        business_description: m.business_description,
                        opening_time: m.opening_time,
                        closing_time: m.closing_time,
                        operating_days: m.operating_days,
                        google_maps_link: m.google_maps_link,
                        logo_url: m.logo_path ? '/static/' + m.logo_path : ''
                    };
                });
                
                console.log('Processed applications:', this.applications);
                this.updateStats();
                this.filterApplications();
            } catch (error) {
                console.error('Error loading applications:', error);
                alert('Failed to load applications. Please try again. Error: ' + error.message);
            } finally {
                this.isLoading = false;
            }
        },

        updateStats() {
            this.totalStats = {
                total: this.applications.length,
                pending: this.applications.filter(a => a.status === 'pending').length,
                approved: this.applications.filter(a => a.status === 'approved').length,
                rejected: this.applications.filter(a => a.status === 'rejected').length
            };
            console.log('Stats updated:', this.totalStats);
        },

        filterApplications() {
            console.log('Filtering applications with:', {
                statusFilter: this.statusFilter,
                searchTerm: this.searchTerm,
                totalApplications: this.applications.length
            });
            
            this.filteredApplications = this.applications.filter(app => {
                const matchesStatus = this.statusFilter === 'all' || app.status === this.statusFilter;
                const searchLower = this.searchTerm.toLowerCase();
                const matchesSearch = !this.searchTerm || 
                    app.business_name.toLowerCase().includes(searchLower) ||
                    (app.owner_name && app.owner_name.toLowerCase().includes(searchLower)) ||
                    (app.city && app.city.toLowerCase().includes(searchLower)) ||
                    (app.province && app.province.toLowerCase().includes(searchLower)) ||
                    app.id.toString().includes(searchLower);
                
                return matchesStatus && matchesSearch;
            });
            
            console.log('Filtered results:', this.filteredApplications.length, 'items');
        },

        getFilteredApplications() {
            this.filterApplications();
            console.log('Returning filtered applications:', this.filteredApplications.length);
            return this.filteredApplications;
        },

        viewApplication(app) {
            this.selectedApp = app;
            this.rejectionReason = '';
        },

        async approveApplication(merchantId) {
            try {
                console.log('Approving merchant:', merchantId);
                const response = await fetch(`/admin/api/merchants/${merchantId}/approve`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCSRFToken()
                    }
                });

                console.log('Approve response status:', response.status);
                console.log('Response content type:', response.headers.get('content-type'));

                // Check if response is JSON
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    console.error('Response is not JSON, received:', await response.text());
                    alert('Server error: Invalid response format. Please check your permissions.');
                    return;
                }

                const data = await response.json();
                console.log('Approval response data:', data);

                if (response.ok && data.success) {
                    console.log('Application approved successfully');
                    this.selectedApp = null;
                    // Redirect to show flash message
                    setTimeout(() => {
                        window.location.href = '/admin/merchants/applications';
                    }, 500);
                } else {
                    console.error('Approval error:', data);
                    alert(`Error: ${data.message || 'Failed to approve application'}`);
                }
            } catch (error) {
                console.error('Error approving application:', error);
                alert('An error occurred while approving the application: ' + error.message);
            }
        },

        async rejectApplication(merchantId, reason) {
            if (!reason.trim()) {
                alert('Please provide a reason for rejection.');
                return;
            }

            try {
                console.log('Rejecting merchant:', merchantId, 'Reason:', reason);
                const response = await fetch(`/admin/api/merchants/${merchantId}/reject`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCSRFToken()
                    },
                    body: JSON.stringify({ reason: reason.trim() })
                });

                console.log('Reject response status:', response.status);
                console.log('Response content type:', response.headers.get('content-type'));

                // Check if response is JSON
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    console.error('Response is not JSON, received:', await response.text());
                    alert('Server error: Invalid response format. Please check your permissions.');
                    return;
                }

                const data = await response.json();
                console.log('Rejection response data:', data);

                if (response.ok && data.success) {
                    console.log('Application rejected successfully');
                    this.selectedApp = null;
                    this.rejectionReason = '';
                    // Redirect to show flash message
                    setTimeout(() => {
                        window.location.href = '/admin/merchants/applications';
                    }, 500);
                } else {
                    console.error('Rejection error:', data);
                    alert(`Error: ${data.message || 'Failed to reject application'}`);
                }
            } catch (error) {
                console.error('Error rejecting application:', error);
                alert('An error occurred while rejecting the application: ' + error.message);
            }
        }
    };
}
</script>

        transform: translateY(0);
    }

    from { opacity: 0; }
    to { opacity: 1; }
