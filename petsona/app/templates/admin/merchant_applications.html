{% extends "admin/base.html" %}

{% block content %}
<div class="merchant-container" x-data="merchantApplications()">
<style>
/* ================= ROOT ================= */
:root {
  --primary-lavender: #5A4B7D;
  --dark-lavender: #3F3555;
  --light-lavender: #9B8BC9;
  --white: #FFFFFF;
  --black: #000000;
  --dark-text: #1a1a1a;
  --light-gray: #F5F5F5;
  --border-color: #E0E0E0;

  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.15);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.2);
}

/* ================= GLOBAL ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #F5F5F5;
}

.merchant-container {
  max-width: 1400px;
  margin: auto;
  padding: clamp(1rem, 4vw, 2.5rem);
}

/* ================= CARD BASE ================= */
.card {
  background: var(--white);
  border: 1px solid var(--border-color);
  border-radius: 1rem;
  box-shadow: var(--shadow-sm);
}

/* ================= HEADER ================= */
.merchant-header {
  margin-bottom: 3rem;
  animation: slideDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.merchant-header h1 {
  font-size: clamp(1.8rem, 4vw, 2.6rem);
  display: flex;
  align-items: center;
  gap: 0.95rem;
  color: var(--dark-text);
  font-weight: 900;
  margin-bottom: 0.65rem;
  letter-spacing: 0.4px;
}

.merchant-header h1 i {
  color: var(--primary-lavender);
  font-size: 2.4rem;
}

.merchant-header p {
  color: var(--dark-text);
  font-size: 1rem;
  margin: 0;
  font-weight: 500;
  letter-spacing: 0.3px;
}

/* ================= STATS ================= */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 1.75rem;
  margin: 2.5rem 0 3.5rem;
}

.stat-card {
  padding: 2.25rem 2rem;
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
  animation: fadeInUp 0.6s ease-out forwards;
  background: var(--white);
  border: 1px solid var(--border-color);
  border-radius: 1rem;
  box-shadow: var(--shadow-sm);
}

.stat-card:nth-child(1) { animation-delay: 0.1s; }
.stat-card:nth-child(2) { animation-delay: 0.2s; }
.stat-card:nth-child(3) { animation-delay: 0.3s; }
.stat-card:nth-child(4) { animation-delay: 0.4s; }

.stat-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
  border-color: var(--primary-lavender);
}

.stat-label {
  font-size: 0.82rem;
  text-transform: uppercase;
  color: var(--dark-text);
  margin-bottom: 0.85rem;
  font-weight: 800;
  letter-spacing: 0.7px;
  display: flex;
  align-items: center;
  gap: 0.7rem;
}

.stat-label i {
  color: var(--primary-lavender);
  font-size: 1.1rem;
}

.stat-value {
  font-size: 2.5rem;
  font-weight: 800;
  color: var(--primary-lavender);
  line-height: 1;
}

/* ================= TABLE ================= */
.applications-card {
  overflow: hidden;
  background: var(--white);
  border: 1px solid var(--border-color);
  border-radius: 1rem;
  box-shadow: var(--shadow-sm);
}

.card-header {
  padding: 1.75rem 2.25rem;
  display: flex;
  gap: 1.25rem;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-color);
  font-weight: 700;
  color: var(--dark-text);
  background: linear-gradient(135deg, var(--primary-lavender), var(--dark-lavender));
  color: var(--white);
}

.search-box {
  position: relative;
  min-width: 260px;
  flex: 1;
  animation: fadeInUp 0.6s ease-out 0.2s backwards;
}

.search-box input {
  width: 100%;
  padding: 0.85rem 1.15rem 0.85rem 2.75rem;
  border-radius: 0.6rem;
  border: 2px solid var(--border-color);
  background: var(--white);
  color: var(--dark-text);
  font-size: 0.92rem;
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  font-weight: 500;
  box-shadow: var(--shadow-sm);
}

.search-box input:focus {
  outline: none;
  border-color: var(--primary-lavender);
  box-shadow: 0 0 0 3px rgba(90, 75, 125, 0.1), var(--shadow-md);
  background: var(--white);
}

.search-box i {
  position: absolute;
  top: 50%;
  left: 1rem;
  transform: translateY(-50%);
  color: var(--dark-text);
  pointer-events: none;
  font-size: 1rem;
}

.card-body {
  overflow-x: auto;
}

.merchant-table {
  width: 100%;
  border-collapse: collapse;
}

.merchant-table th {
  text-align: left;
  padding: 1.15rem 1.25rem;
  font-size: 0.87rem;
  text-transform: uppercase;
  color: var(--dark-text);
  font-weight: 800;
  letter-spacing: 0.6px;
  background: var(--light-gray);
  border-bottom: 1px solid var(--border-color);
}

.merchant-table td {
  padding: 1.2rem 1.25rem;
  border-top: 1px solid var(--border-color);
  color: var(--dark-text);
  font-weight: 500;
}

.merchant-table tbody tr {
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  background: var(--white);
}

.merchant-table tbody tr:hover {
  background: var(--light-gray);
  box-shadow: inset 0 0 0 1px var(--border-color);
}

.merchant-name {
  font-weight: 800;
  color: var(--primary-lavender);
  letter-spacing: 0.2px;
  word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: break-word;
  max-width: 100%;
}

.merchant-contact {
  font-size: 0.85rem;
  color: var(--dark-text);
  word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: break-word;
  max-width: 100%;
}

.merchant-contact strong {
  color: var(--dark-text);
  display: block;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

/* ================= STATUS ================= */
.status-badge {
  display: inline-flex;
  gap: 0.5rem;
  align-items: center;
  padding: 0.6rem 1rem;
  border-radius: 0.5rem;
  font-size: 0.78rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  box-shadow: var(--shadow-sm);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.status-badge:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.status-pending {
  background: #FEF3C7;
  color: #92400E;
  border: 1px solid #FCD34D;
}

.status-pending:hover {
  box-shadow: 0 4px 12px rgba(253, 211, 77, 0.3);
}

.status-under-review {
  background: #DBEAFE;
  color: #1E40AF;
  border: 1px solid #93C5FD;
}

.status-under-review:hover {
  box-shadow: 0 4px 12px rgba(147, 197, 253, 0.3);
}

.status-approved {
  background: #DCFCE7;
  color: #15803D;
  border: 1px solid #86EFAC;
}

.status-approved:hover {
  box-shadow: 0 4px 12px rgba(134, 239, 172, 0.3);
}

.status-rejected {
  background: #FEE2E2;
  color: #991B1B;
  border: 1px solid #FECACA;
}

.status-rejected:hover {
  box-shadow: 0 4px 12px rgba(254, 202, 202, 0.3);
}

/* ================= ACTIONS ================= */
.action-buttons {
  display: flex;
  gap: .4rem;
  flex-wrap: wrap;
}

.action-btn {
  padding: 0.75rem 1.5rem;
  border-radius: 0.6rem;
  border: none;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 800;
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.65px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}

.action-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: rgba(255, 255, 255, 0.2);
  transition: left 0.35s ease;
}

.action-btn:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.action-btn:hover::before {
  left: 100%;
}

.action-btn-secondary {
  background: var(--light-gray);
  color: var(--primary-lavender);
  border: 2px solid var(--primary-lavender);
  font-weight: 800;
}

.action-btn-secondary:hover {
  background: var(--primary-lavender);
  color: var(--white);
  box-shadow: 0 4px 12px rgba(90, 75, 125, 0.2);
}

.action-btn-success {
  background: #10b981;
  color: white;
  font-weight: 800;
}

.action-btn-success:hover {
  background: #059669;
  box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);
}

.action-btn-warning {
  background: #f59e0b;
  color: white;
  font-weight: 800;
}

.action-btn-warning:hover {
  background: #d97706;
  box-shadow: 0 4px 12px rgba(245, 158, 11, 0.35);
}

.action-btn-danger {
  background: #ef4444;
  color: white;
  font-weight: 800;
}

.action-btn-danger:hover {
  background: #dc2626;
  box-shadow: 0 4px 12px rgba(239, 68, 68, 0.35);
}

/* ================= EMPTY STATE ================= */
.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--dark-text);
}

.empty-state i {
  font-size: 3rem;
  color: var(--primary-lavender);
  margin-bottom: 1rem;
  opacity: 0.7;
}

.empty-state h3 {
  font-size: 1.25rem;
  color: var(--dark-text);
  margin-bottom: 0.5rem;
  font-weight: 700;
}

/* ================= LOADING ================= */
.loading-spinner {
  display: inline-block;
  width: 1rem;
  height: 1rem;
  border: 2px solid var(--border-color);
  border-top-color: var(--primary-lavender);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-state {
  text-align: center;
  padding: 3rem;
  color: var(--dark-text);
}

/* ================= MOBILE CARD TABLE ================= */
@media (max-width: 768px) {
  .merchant-container {
    padding: 1rem;
  }

  .merchant-header h1 {
    font-size: 1.5rem;
  }

  .search-box {
    min-width: 100%;
  }

  .merchant-table thead { display:none; }

  .merchant-table,
  .merchant-table tbody,
  .merchant-table tr,
  .merchant-table td {
    display:block;
    width:100%;
  }

  .merchant-table tr {
    background: var(--white);
    border-radius: 0.6rem;
    margin-bottom: 1rem;
    padding: 1rem;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border-color);
  }

  .merchant-table td {
    border:none;
    padding:.5rem 0;
  }

  .merchant-table td::before {
    content: attr(data-label);
    display:block;
    font-size:.7rem;
    font-weight:700;
    color: var(--dark-text);
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }

  .action-buttons {
    margin-top:.75rem;
    gap: 0.3rem;
  }

  .action-btn {
    flex: 1;
    justify-content: center;
    padding: 0.5rem 0.5rem;
    font-size: 0.7rem;
  }

  .modal-content {
    max-width: 100%;
    width: 95%;
  }

  .modal-body {
    max-height: 70vh;
    padding: 1.5rem;
  }

  .detail-grid {
    grid-template-columns: 1fr;
  }

  .photos-gallery {
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  }
}

@media (max-width: 480px) {
  .merchant-container {
    padding: 0.75rem;
  }

  .merchant-header h1 {
    font-size: 1.25rem;
  }

  .stats-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
  }

  .stat-card {
    padding: 1.25rem;
  }

  .stat-value {
    font-size: 1.5rem;
  }

  .card-header {
    padding: 1rem 1.25rem;
    flex-direction: column;
  }

  .merchant-table tr {
    padding: 0.75rem;
  }

  .action-btn {
    padding: 0.45rem 0.4rem;
    font-size: 0.65rem;
  }

  .modal-header {
    padding: 1.5rem;
  }

  .modal-title {
    font-size: 1.3rem;
  }

  .photos-gallery {
    grid-template-columns: repeat(2, 1fr);
    gap: 0.75rem;
  }
}

/* ================= MODAL ================= */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal-backdrop.show { display:flex; }

.modal-content {
  max-width: 900px;
  width: 92%;
  animation: scaleIn .35s cubic-bezier(0.34, 1.56, 0.64, 1);
  background: var(--white) !important;
  border: 1px solid var(--border-color);
  box-shadow: var(--shadow-lg);
  border-radius: 1rem;
  overflow: hidden;
  word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: break-word;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes scaleIn {
  from {opacity:0; transform:scale(.92) translateY(15px);}
  to {opacity:1; transform:scale(1);}
}

.modal-header {
  padding: 2.5rem;
  background: linear-gradient(135deg, var(--primary-lavender), var(--dark-lavender)) !important;
  color: var(--white);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid var(--border-color);
}

.modal-title {
  font-size: 1.8rem;
  font-weight: 900;
  display: flex;
  align-items: center;
  gap: 1.25rem;
  position: relative;
  z-index: 1;
  letter-spacing: 0.5px;
  word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: break-word;
  flex-wrap: wrap;
  max-width: 100%;
  color: var(--white);
}

.modal-title i {
  font-size: 2.2rem;
  opacity: 0.98;
}

.modal-close {
  background: rgba(255, 255, 255, 0.2);
  border: 2px solid rgba(255, 255, 255, 0.4);
  color: white;
  font-size: 1.4rem;
  cursor: pointer;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 0.6rem;
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  z-index: 2;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
}

.modal-close:hover {
  background: rgba(255, 255, 255, 0.3);
  border-color: rgba(255, 255, 255, 0.6);
  transform: rotate(90deg) scale(1.15);
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
}

.modal-body {
  padding: 2.5rem;
  max-height: 65vh;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--white) !important;
  word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: break-word;
}

.modal-body::-webkit-scrollbar {
  width: 8px;
}

.modal-body::-webkit-scrollbar-track {
  background: var(--light-gray);
  border-radius: 10px;
}

.modal-body::-webkit-scrollbar-thumb {
  background: var(--primary-lavender);
  border-radius: 10px;
  transition: all 0.3s ease;
}

.modal-body::-webkit-scrollbar-thumb:hover {
  background: var(--dark-lavender);
}

.detail-section {
  margin-bottom: 2.5rem;
  padding-bottom: 2.5rem;
  border-bottom: 1px solid var(--border-color);
}

.detail-section:last-child {
  border-bottom: none;
  margin-bottom: 0;
  padding-bottom: 0;
}

.detail-section-title {
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--primary-lavender);
  margin-bottom: 1.35rem;
  display: flex;
  align-items: center;
  gap: 0.95rem;
  text-transform: uppercase;
  letter-spacing: 0.65px;
}

.detail-section-title i {
  font-size: 1.5rem;
  color: var(--primary-lavender);
}

.detail-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 2rem;
}

.detail-item {
  display: flex;
  flex-direction: column;
  word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: break-word;
  max-width: 100%;
}

.detail-label {
  font-size: 0.78rem;
  color: var(--dark-text);
  text-transform: uppercase;
  letter-spacing: 0.75px;
  font-weight: 800;
  margin-bottom: 0.65rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.detail-value {
  font-size: 1.08rem;
  color: var(--dark-text);
  font-weight: 700;
  line-height: 1.6;
  letter-spacing: 0.2px;
  word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: break-word;
  max-width: 100%;
}

.detail-value.text-muted {
  color: var(--dark-text);
  font-weight: 500;
  font-size: 0.98rem;
  line-height: 1.65;
  word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: break-word;
  white-space: normal;
}

.detail-value a {
  color: var(--primary-lavender);
  text-decoration: none;
  font-weight: 700;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  border-bottom: 2px solid transparent;
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
}

.detail-value a:hover {
  color: var(--dark-lavender);
  border-bottom-color: var(--primary-lavender);
  transform: translateX(2px);
}

.form-group {
  margin-bottom: 1.75rem;
}

.form-label {
  display: block;
  font-size: 0.93rem;
  font-weight: 800;
  color: var(--dark-text);
  margin-bottom: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-control {
  width: 100%;
  padding: 1.1rem 1.35rem;
  border: 1px solid var(--border-color);
  border-radius: 0.6rem;
  background: var(--white) !important;
  color: var(--dark-text);
  font-size: 0.98rem;
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  font-family: inherit;
  font-weight: 500;
  letter-spacing: 0.3px;
  box-shadow: var(--shadow-sm);
  word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: break-word;
  white-space: normal;
}

.form-control:focus {
  outline: none;
  border-color: var(--primary-lavender);
  box-shadow: 0 0 0 3px rgba(90, 75, 125, 0.1), var(--shadow-md);
  background: var(--white) !important;
}

.form-control::placeholder {
  color: var(--dark-text);
  font-weight: 500;
}

.modal-footer {
  padding: 2.25rem 2.5rem;
  background: var(--white) !important;
  border-top: 1px solid var(--border-color);
  display: flex;
  gap: 1.35rem;
  justify-content: flex-end;
  flex-wrap: wrap;
  align-items: center;
}
  align-items: center;
}

.service-list,
.pet-list {
  display: flex;
  flex-wrap: wrap;
  gap: 0.85rem;
}

.service-item,
.pet-item {
  background: #DCFCE7;
  color: #15803D;
  padding: 0.6rem 1.1rem;
  border-radius: 0.5rem;
  font-size: 0.82rem;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  gap: 0.55rem;
  border: 1px solid #86EFAC;
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  letter-spacing: 0.3px;
}

.service-item i,
.pet-item i {
  font-size: 0.9rem;
}

.service-item:hover,
.pet-item:hover {
  background: #BBF7D0;
  border-color: #16A34A;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(22, 163, 74, 0.2);
}

/* ================= FACILITY PHOTOS ================= */
.photos-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 1rem;
  margin-top: 1rem;
}

.photo-item-wrapper {
  position: relative;
}

.photo-item {
  position: relative;
  overflow: hidden;
  border-radius: 0.6rem;
  border: 1px solid var(--border-color);
  aspect-ratio: 1;
  background: var(--light-gray);
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.photo-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: all 0.3s ease;
  display: block;
}

.photo-item:hover {
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
  border-color: var(--primary-lavender);
}

.photo-item:hover img {

<script>
  function merchantApplications() {
    return {
      applications: [],
      selectedApp: null,
      searchTerm: '',
      isLoading: false,
      showDetailModal: false,
      rejectionReason: '',

      async init() {
        await this.loadApplications();
      },

      async loadApplications() {
        this.isLoading = true;
        try {
          const response = await fetch(`/admin/api/merchants?status=all`);
          if (!response.ok) throw new Error('Failed to load applications');
          
          const data = await response.json();
          this.applications = data.merchants || [];
        } catch (error) {
          console.error('Error loading applications:', error);
          alert('Failed to load merchant applications');
        } finally {
          this.isLoading = false;
        }
      },

      getFilteredApplications() {
        let filtered = this.applications;

        // Search filter
        if (this.searchTerm.trim()) {
          const term = this.searchTerm.toLowerCase();
          filtered = filtered.filter(app =>
            app.business_name.toLowerCase().includes(term) ||
            app.owner_manager_name.toLowerCase().includes(term) ||
            app.city.toLowerCase().includes(term) ||
            app.province.toLowerCase().includes(term) ||
            app.business_type.toLowerCase().includes(term)
          );
        }

        return filtered;
      },

      getTotalCount() {
        return this.applications.length;
      },

      getPendingCount() {
        return this.applications.filter(a => a.application_status === 'pending').length;
      },

      getApprovedCount() {
        return this.applications.filter(a => a.application_status === 'approved').length;
      },

      getRejectedCount() {
        return this.applications.filter(a => a.application_status === 'rejected').length;
      },

      getStatusClass(status) {
        const classes = {
          'pending': 'status-pending',
          'under_review': 'status-under-review',
          'approved': 'status-approved',
          'rejected': 'status-rejected'
        };
        return classes[status] || 'status-pending';
      },

      getStatusIcon(status) {
        const icons = {
          'pending': 'fas fa-hourglass-half',
          'under_review': 'fas fa-magnifying-glass',
          'approved': 'fas fa-check-circle',
          'rejected': 'fas fa-times-circle'
        };
        return icons[status] || 'fas fa-question-circle';
      },

      formatDate(dateString) {
        return new Date(dateString).toLocaleDateString('en-PH', { 
          year: 'numeric', 
          month: 'short', 
          day: 'numeric' 
        });
      },

      getTimeAgo(dateString) {
        const now = new Date();
        const date = new Date(dateString);
        const diff = Math.floor((now - date) / 1000);

        if (diff < 60) return 'just now';
        if (diff < 3600) return `${Math.floor(diff / 60)}m`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h`;
        if (diff < 604800) return `${Math.floor(diff / 86400)}d`;
        return `${Math.floor(diff / 604800)}w`;
      },

      handlePhotoError(event) {
        event.target.innerHTML = '<div class="photo-placeholder"><i class="fas fa-image"></i></div>';
      },

      viewApplication(id) {
        this.selectedApp = this.applications.find(a => a.id === id);
        this.rejectionReason = '';
        this.showDetailModal = true;
      },

      closeModal() {
        this.showDetailModal = false;
        this.selectedApp = null;
        this.rejectionReason = '';
      },

      async approveApplication(id) {
        if (!confirm('Are you sure you want to approve this application?')) return;

        try {
          const response = await fetch(`/admin/api/merchants/${id}/approve`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
          });

          if (!response.ok) throw new Error('Failed to approve');

          alert('Application approved successfully!');
          await this.loadApplications();
        } catch (error) {
          console.error('Error:', error);
          alert('Error approving application: ' + error.message);
        }
      },

      async rejectApplication(id) {
        const reason = this.rejectionReason.trim();
        if (!reason) {
          alert('Please enter a rejection reason');
          return;
        }

        try {
          const response = await fetch(`/admin/api/merchants/${id}/reject`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ reason })
          });

          if (!response.ok) throw new Error('Failed to reject');

          alert('Application rejected.');
          await this.loadApplications();
        } catch (error) {
          console.error('Error:', error);
          alert('Error rejecting application: ' + error.message);
        }
      }
    };
  }
</script>
