<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Mobile-first viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="theme-color" content="#343a40">

    <title>{{ title or "Merchant Dashboard" }}</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- AdminLTE & Bootstrap (Mobile-ready by default) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/plugins/fontawesome-free/css/all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/dist/css/adminlte.min.css') }}">

    <!-- Optional: Touch & mobile UX helpers -->
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/plugins/overlayScrollbars/css/OverlayScrollbars.min.css') }}">

    <!-- Custom styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='merchant/custom.css') }}">

    <!-- Allow child templates to add styles -->
    {% block styles %}{% endblock %}
</head>

<body class="hold-transition sidebar-mini layout-fixed">

<div class="wrapper">

    {% include 'merchant/partials/navbar.html' %}
    {% include 'merchant/partials/sidebar.html' %}

    <!-- Content Wrapper -->
    <div class="content-wrapper">
        <section class="content pt-3">
            <div class="container-fluid">
                {% block content %}{% endblock %}
            </div>
        </section>
    </div>

</div>

<!-- Core JS -->
<script src="{{ url_for('static', filename='admin/plugins/jquery/jquery.min.js') }}"></script>
<script src="{{ url_for('static', filename='admin/plugins/bootstrap/js/bootstrap.bundle.min.js') }}"></script>

<!-- AdminLTE -->
<script src="{{ url_for('static', filename='admin/dist/js/adminlte.min.js') }}"></script>

<!-- Mobile UX Enhancements -->
<script src="{{ url_for('static', filename='admin/plugins/overlayScrollbars/js/jquery.overlayScrollbars.min.js') }}"></script>

<!-- Optional: fast tap response on mobile -->
<script src="{{ url_for('static', filename='admin/plugins/fastclick/fastclick.js') }}"></script>

<!-- Custom JS -->
<script src="{{ url_for('static', filename='js/petLoader.js') }}"></script>

<!-- Allow child templates to add scripts -->
{% block scripts %}{% endblock %}


</body>
</html>
