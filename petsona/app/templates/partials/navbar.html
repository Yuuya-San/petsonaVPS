<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PetSona</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --lavender-main: #8b5cf6;
  --lavender-glow: rgba(139,92,246,.45);
  --lavender-soft: rgba(139,92,246,.18);
  --gray-main: #1f2937;

  --glass-bg: rgba(255,255,255,255);
  --glass-border: rgba(255,255,255,.45);
  --glass-shadow: rgba(15,23,42,.18);

  /* DARK GLASS (MOBILE) */
  --dark-glass-bg: rgba(15,23,42,.95);
  --dark-glass-border: rgba(255,255,255,.08);
  --dark-glass-shadow: rgba(0,0,0,.6);
}

/* ================= RESET ================= */
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  font-family: "Poppins", system-ui, sans-serif;
  background: #f8fafc;
}

body {
  padding-top: 80px;
}

/* ================= NAVBAR ================= */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 80px;
  z-index: 1000;

  background: linear-gradient(
    135deg,
    rgba(248,250,252,.75),
    rgba(237,233,254,.6)
  );

  backdrop-filter: blur(22px) saturate(1.25);
  -webkit-backdrop-filter: blur(22px) saturate(1.25);

  border-bottom: 1px solid var(--glass-border);
  box-shadow:
    0 20px 50px var(--glass-shadow),
    inset 0 1px 0 rgba(255,255,255,.6);
}

/* ================= NAV CONTENT ================= */
.nav-container {
  max-width: 1600px;
  height: 100%;
  margin: 0 auto;
  padding: 0 clamp(1rem, 4vw, 3.5rem);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* ================= BRAND ================= */
.brand {
  display: flex;
  align-items: center;
  gap: .6rem;
  text-decoration: none;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--gray-main);
}

.brand i {
  color: var(--lavender-main);
  filter: drop-shadow(0 0 6px var(--lavender-glow));
}

/* ================= LINKS ================= */
.nav-links {
  list-style: none;
  display: flex;
  align-items: center;
  gap: 2.6rem;
  margin: 0;
  padding: 0;
}

.nav-links a {
  text-decoration: none;
  font-size: .95rem;
  font-weight: 500;
  color: #475569;
}

.nav-links a.active {
  color: var(--lavender-main);
  font-weight: 600;
}

/* ================= LOGIN ================= */
.nav-auth a {
  padding: .55rem 1.5rem;
  border-radius: 999px;
  background: rgba(255,255,255,.7);
  color: var(--lavender-main);
  font-weight: 600;
  border: 1px solid var(--glass-border);
}

/* ================= HAMBURGER ================= */
.nav-toggle {
  display: none;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  cursor: pointer;
}

.nav-toggle span {
  width: 26px;
  height: 2.5px;
  background: #475569;
  border-radius: 2px;
}

/* ================= MOBILE ================= */
@media (max-width: 900px) {

  body { padding-top: 70px; }
  .navbar {
    height: 70px;
    background: var(--dark-glass-bg);
    backdrop-filter: blur(32px) saturate(1.5);
    -webkit-backdrop-filter: blur(32px) saturate(1.5);
    border-bottom: 1px solid var(--dark-glass-border);
    box-shadow: 0 25px 70px var(--dark-glass-shadow);
  }

  .brand {
    color: #f1f5f9;
  }

  .brand i {
    color: #c4b5fd;
  }

  .nav-toggle {
    display: flex;
  }

  .nav-toggle span {
    background: #e5e7eb;
  }

  .nav-links {
    position: absolute;
    top: calc(100% + 12px);
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 2rem);
    max-width: 460px;
    flex-direction: column;
    padding: 1.4rem;
    display: none;

    background: rgba(15,23,42,.88);
    backdrop-filter: blur(34px) saturate(1.6);
    border-radius: 26px;
    border: 1px solid var(--dark-glass-border);
    box-shadow: 0 40px 90px rgba(0,0,0,.75);
  }

  .nav-links.active {
    display: flex;
  }

  .nav-links li {
    text-align: center;
    padding: .6rem 0;
  }

  .nav-links a {
    color: #e5e7eb;
    padding: .7rem;
    border-radius: 14px;
  }

  .nav-links a.active {
    background: rgba(139,92,246,.25);
    color: #fff;
  }

  .nav-auth {
    margin-top: .8rem;
    padding-top: .8rem;
    border-top: 1px solid rgba(255,255,255,.1);
  }

  .nav-auth a {
    width: 100%;
  }
}

/* BRAND IMAGE LOGO */
.brand {
  display: flex;
  align-items: center;
  gap: .8rem;
  text-decoration: none;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--gray-main);
}

.brand span:last-child {
  font-weight: 700;
  letter-spacing: .03em;
  background: linear-gradient(
    135deg,
    #8b5cf6,
    #6366f1
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}


.brand-logo {
  width: 50px;
  height: 50px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.brand-logo img {
  width: 70px;
  height: 70px;
  object-fit: cover;
  display: block;
}



/* MOBILE & TABLET */
@media (max-width: 1024px) {
  .brand {
    color: #f1f5f9;
    font-size: 1.4rem;
  }

  .brand-logo {
    width: 50px;
    height: 50px;
    margin-right: 0%;
  }
}


</style>
</head>

<body>

<nav class="navbar">
  <div class="nav-container">

    <a href="{{ url_for('auth.home') }}" class="brand">
      <span class="brand-logo">
        <img src="{{ url_for('static', filename='images/logo/petsona-logo.png') }}" alt="PetSona Logo">
      </span>
      <span>PetSona</span>
    </a>


    <button class="nav-toggle" aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="nav-links">
      <li><a href="{{ url_for('auth.home') }}" class="{% if request.endpoint == 'auth.home' %}active{% endif %}">Home</a></li>
      <li><a href="{{ url_for('auth.feature') }}" class="{% if request.endpoint == 'auth.feature' %}active{% endif %}">Features</a></li>
      <li><a href="{{ url_for('auth.about') }}" class="{% if request.endpoint == 'auth.about' %}active{% endif %}">About</a></li>
      <li><a href="{{ url_for('auth.contact') }}" class="{% if request.endpoint == 'auth.contact' %}active{% endif %}">Contact</a></li>
      <li class="nav-auth">
        <a href="{{ url_for('auth.login') }}">Login</a>
      </li>
    </ul>

  </div>
</nav>

<script>
const toggle = document.querySelector('.nav-toggle');
const links = document.querySelector('.nav-links');

toggle.addEventListener('click', () => {
  links.classList.toggle('active');
});
</script>

</body>
</html>
