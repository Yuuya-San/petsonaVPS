{% extends "user/base.html" %}

<!-- FontAwesome CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  /* Premium Animations */
  @keyframes slideInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fadeInScale {
    from {
      opacity: 0;
      transform: scale(0.95);
    }
    to {
      opacity: 1;
      transform: scale(1);
    }
  }

  @keyframes pulse-soft {
    0%, 100% {
      opacity: 1;
    }
    50% {
      opacity: 0.7;
    }
  }

  @keyframes float {
    0%, 100% {
      transform: translateY(0px);
    }
    50% {
      transform: translateY(-8px);
    }
  }

  .animate-slide-in {
    animation: slideInUp 0.6s cubic-bezier(0.23, 1, 0.320, 1);
  }

  .animate-fade-scale {
    animation: fadeInScale 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .animate-float {
    animation: float 3s ease-in-out infinite;
  }

  /* Premium Card Styling */
  .premium-card {
    transition: all 0.5s cubic-bezier(0.23, 1, 0.320, 1);
    background: linear-gradient(135deg, #ffffff 0%, #fafbff 95%, #f5f3ff 100%);
    border: 1px solid rgba(168, 139, 250, 0.3);
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05), 0 10px 30px rgba(139, 92, 246, 0.08);
    backdrop-filter: blur(10px);
  }

  .premium-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
    transition: left 0.6s ease;
  }

  .premium-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 8px 12px rgba(0, 0, 0, 0.08), 0 24px 48px rgba(139, 92, 246, 0.15);
    border-color: rgba(139, 92, 246, 0.5);
  }

  .premium-card:hover::before {
    left: 100%;
  }

  /* Distance Badge Premium */
  .distance-badge {
    background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 50%, #c4b5fd 100%);
    box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.3);
    font-weight: 800;
    letter-spacing: 0.8px;
    border: 1.5px solid rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(8px);
    transition: all 0.3s ease;
  }

  .distance-badge:hover {
    transform: scale(1.05) translateY(-2px);
    box-shadow: 0 12px 32px rgba(139, 92, 246, 0.5);
  }

  /* Status Badge */
  .status-badge {
    font-weight: 700;
    letter-spacing: 0.5px;
    border: 1.5px solid;
    backdrop-filter: blur(8px);
    transition: all 0.3s ease;
  }

  .status-open {
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(34, 197, 94, 0.12));
    border-color: #22c55e !important;
    color: #166534;
    box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2);
  }

  .status-open:hover {
    box-shadow: 0 6px 16px rgba(34, 197, 94, 0.3);
    transform: translateY(-2px);
  }

  .status-closed {
    background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.12));
    border-color: #ef4444 !important;
    color: #7f1d1d;
    box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
  }

  .status-closed:hover {
    box-shadow: 0 6px 16px rgba(239, 68, 68, 0.3);
    transform: translateY(-2px);
  }

  /* Premium Scrollbar */
  ::-webkit-scrollbar {
    width: 8px;
  }

  ::-webkit-scrollbar-track {
    background: #f9f8ff;
  }

  ::-webkit-scrollbar-thumb {
    background: #ddd6fe;
    border-radius: 4px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: #c4b5fd;
  }

  /* Link Styling */
  a.premium-card {
    text-decoration: none;
    color: inherit;
  }

  /* Alpine Cloak */
  [x-cloak] {
    display: none !important;
  }
</style>

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-white via-purple-50/30 to-white py-6 lg:py-8 px-3 sm:px-4" x-data="premiumNearbyServices()" x-cloak @mount="init()">
  <div class="w-full max-w-7xl mx-auto px-3 sm:px-6 lg:px-8">
    
    <!-- Simple Hero Section -->
    <div class="mb-6 lg:mb-8 animate-slide-in">
      <div class="flex items-center gap-3 lg:gap-4 mb-2">
        <div class="w-10 h-10 lg:w-12 lg:h-12 bg-gradient-to-br from-purple-600 to-purple-700 rounded-full flex items-center justify-center text-white shadow-lg animate-float flex-shrink-0">
          <i class="fas fa-location-dot text-base lg:text-lg"></i>
        </div>
        <div>
          <h1 class="text-2xl sm:text-3xl lg:text-5xl font-black text-slate-900 tracking-tight">Nearby Pet Services</h1>
          <p class="text-xs sm:text-sm text-slate-600 font-medium mt-0.5">Find the perfect care around you</p>
        </div>
      </div>
      <div class="flex items-center justify-between mt-4">

        <!-- Current Location Badge -->
        <div x-show="hasLocation" class="inline-flex items-center gap-2 px-3 lg:px-4 py-1.5 lg:py-2 bg-white border-2 border-purple-200 rounded-full text-xs lg:text-sm font-bold text-slate-900 shadow-sm">
          <i class="fas fa-location-dot text-purple-600"></i>
          <span>📍 Current location</span>
        </div>
      </div>
    </div>

    <!-- Request Location Banner -->
    <div x-show="!hasLocation && !locationRequested" class="mb-6 lg:mb-8 animate-slide-in">
      <div class="premium-card rounded-2xl lg:rounded-3xl p-6 lg:p-8 border-2 border-purple-200">
        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-5 lg:gap-8 justify-between">
          <div class="flex items-start gap-4 lg:gap-6 flex-1">
            <div class="text-4xl sm:text-5xl lg:text-6xl text-purple-500 flex-shrink-0 animate-float">
              <i class="fas fa-location-crosshairs"></i>
            </div>
            <div>
              <h3 class="font-black text-slate-900 mb-2 lg:mb-3 text-lg lg:text-2xl tracking-tight">Enable Location</h3>
              <p class="text-slate-600 leading-relaxed text-sm lg:text-base font-medium">Show pet services near you. <span class="text-slate-900 font-bold">Private & secure.</span></p>
              <p class="text-slate-500 text-xs lg:text-sm mt-2 flex items-center gap-2">
                <i class="fas fa-shield-alt text-emerald-600"></i>
                Encrypted
              </p>
            </div>
          </div>
          <div class="flex flex-col sm:flex-row gap-2.5 lg:gap-3 w-full sm:w-auto flex-shrink-0">
            <button @click="requestLocation()" class="px-5 lg:px-8 py-2.5 lg:py-4 bg-gradient-to-r from-purple-600 to-purple-700 hover:from-purple-700 hover:to-purple-800 text-white rounded-xl lg:rounded-2xl font-bold transition-all duration-300 hover:shadow-2xl transform hover:scale-105 flex items-center justify-center gap-2 shadow-lg text-sm lg:text-base">
              <i class="fas fa-check-circle text-base lg:text-lg"></i> Allow
            </button>
            <button @click="skipLocation()" class="px-5 lg:px-8 py-2.5 lg:py-4 bg-white hover:bg-purple-50 text-slate-900 rounded-xl lg:rounded-2xl font-bold border-2 border-slate-300 hover:border-purple-300 transition-all duration-300 flex items-center justify-center gap-2 text-sm lg:text-base">
              <i class="fas fa-times"></i> Skip
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Premium Search & Filter Bar -->
    <div class="mb-6 lg:mb-8 animate-slide-in">
      <div class="premium-card rounded-2xl lg:rounded-3xl p-4 lg:p-6 border-2 border-purple-100">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 lg:gap-4">
          <!-- Search Input -->
          <div class="lg:col-span-2">
            <div class="relative group">
              <input type="text" 
                     x-model="searchQuery"
                     @input="fetchMerchants()"
                     placeholder="Search services..."
                     class="w-full px-4 lg:px-5 py-2.5 lg:py-3 rounded-lg lg:rounded-xl border-2 border-purple-200 focus:border-purple-500 focus:outline-none bg-white text-slate-900 placeholder-slate-400 transition-all duration-300 font-medium shadow-sm focus:shadow-md text-sm lg:text-base">
              <i class="fas fa-search absolute right-3 lg:right-3.5 top-1/2 transform -translate-y-1/2 text-slate-400 group-focus-within:text-purple-600 transition-colors text-xs lg:text-sm"></i>
            </div>
          </div>

          <!-- Service Filter -->
          <div>
            <select x-model="selectedService" @change="fetchMerchants()" class="w-full px-3 lg:px-4 py-2.5 lg:py-3 rounded-lg lg:rounded-xl border-2 border-purple-200 focus:border-purple-500 focus:outline-none bg-white text-slate-900 font-medium cursor-pointer transition-all duration-300 shadow-sm focus:shadow-md appearance-none text-sm lg:text-base">
              <option value="">All services</option>
              <option value="grooming">✂️ Grooming</option>
              <option value="boarding">🏠 Boarding</option>
              <option value="veterinary">⚕️ Vet</option>
              <option value="training">🎓 Training</option>
              <option value="transport">🚗 Transport</option>
            </select>
          </div>

          <!-- Distance Filter -->
          <div>
            <select x-model="maxDistance" @change="fetchMerchants()" class="w-full px-3 lg:px-4 py-2.5 lg:py-3 rounded-lg lg:rounded-xl border-2 border-purple-200 focus:border-purple-500 focus:outline-none bg-white text-slate-900 font-medium cursor-pointer transition-all duration-300 shadow-sm focus:shadow-md appearance-none text-sm lg:text-base">
              <option value="5">5 km</option>
              <option value="10">10 km</option>
              <option value="25">25 km</option>
              <option value="50">50 km</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Simple Results & Sort -->
    <div class="mb-6 lg:mb-8 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2.5 lg:gap-4 animate-slide-in">
      <p class="font-bold text-sm lg:text-base text-slate-900" x-text="merchants.length + ' service provider' + (merchants.length !== 1 ? 's found' : ' found')"></p>
      <select x-model="sortBy" @change="fetchMerchants()" class="px-3 lg:px-4 py-1.5 lg:py-2 rounded-lg border-2 border-purple-200 bg-white text-slate-900 font-semibold text-sm lg:text-base cursor-pointer transition-all focus:outline-none focus:border-purple-500 appearance-none w-full sm:w-auto">
        <option value="distance">📍 Distance</option>
        <option value="rating">⭐ Rating</option>
        <option value="name">🔤 Name</option>
      </select>
    </div>

    <!-- Loading State -->
    <div x-show="isLoading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-6 mb-8 lg:mb-12">
      <template x-for="i in 6" :key="i">
        <div class="premium-card rounded-xl lg:rounded-3xl overflow-hidden h-80 lg:h-96 border-2 border-purple-200">
          <div class="h-24 sm:h-28 lg:h-40 bg-gradient-to-r from-purple-200 via-purple-100 to-purple-50 animate-pulse"></div>
          <div class="p-3 lg:p-6 space-y-3 lg:space-y-4">
            <div class="h-3 lg:h-4 bg-gradient-to-r from-purple-100 to-purple-50 rounded-lg w-3/4 animate-pulse"></div>
            <div class="h-2 lg:h-3 bg-gradient-to-r from-purple-100 to-purple-50 rounded-lg w-1/2 animate-pulse"></div>
            <div class="grid grid-cols-3 gap-2 lg:gap-3">
              <div class="h-12 lg:h-16 bg-gradient-to-r from-purple-100 to-purple-50 rounded-lg animate-pulse"></div>
              <div class="h-12 lg:h-16 bg-gradient-to-r from-purple-100 to-purple-50 rounded-lg animate-pulse"></div>
              <div class="h-12 lg:h-16 bg-gradient-to-r from-purple-100 to-purple-50 rounded-lg animate-pulse"></div>
            </div>
          </div>
        </div>
      </template>
    </div>

    <!-- Premium Services Grid -->
    <div x-show="!isLoading && merchants.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 lg:gap-6 mb-12">
      <template x-for="merchant in merchants" :key="merchant.id">
        <a :href="'/merchant/store-public/' + merchant.id" class="premium-card rounded-xl lg:rounded-3xl overflow-hidden cursor-pointer group flex flex-col hover:no-underline transition-all border-2">
          
          <!-- Premium Image/Banner -->
          <div class="relative h-24 sm:h-28 lg:h-40 bg-gradient-to-br from-purple-300 via-purple-200 to-purple-100 overflow-hidden flex items-center justify-center border-b-2 border-purple-200 group-hover:from-purple-400 group-hover:via-purple-300 transition-all duration-300">
            <i class="fas fa-store text-5xl sm:text-6xl lg:text-7xl opacity-20 group-hover:opacity-30 transition-opacity"></i>
            
            <!-- Distance Badge - Premium Position -->
            <div class="absolute top-2 right-2 lg:top-3 lg:right-3">
              <div class="distance-badge rounded-full px-2.5 lg:px-4 py-1 lg:py-2 text-white text-xs lg:text-xs font-black shadow-xl flex items-center gap-1.5">
                <i class="fas fa-location-arrow text-xs"></i>
                <span x-text="merchant.distance.toFixed(1) + 'km'"></span>
              </div>
            </div>

            <!-- Status Badge - Premium -->
            <div class="absolute top-2 left-2 lg:top-3 lg:left-3 rounded-full px-2.5 lg:px-3.5 py-1 lg:py-1.5 flex items-center gap-1 status-badge text-xs lg:text-xs"
                 :class="merchant.is_open ? 'status-open' : 'status-closed'">
              <i :class="merchant.is_open ? 'fas fa-check-circle' : 'fas fa-circle-xmark'" class="text-xs"></i>
              <span x-text="merchant.is_open ? 'Open' : 'Closed'" class="font-bold hidden sm:inline"></span>
            </div>

            <!-- Rating Badge - Bottom Right -->
            <div class="absolute bottom-2 right-2 lg:bottom-3 lg:right-3 bg-white/95 backdrop-blur-sm rounded-full px-2 lg:px-3 py-0.5 lg:py-1 flex items-center gap-0.5 border-2 border-purple-300 text-xs shadow-lg">
              <i class="fas fa-star text-amber-400 text-xs"></i>
              <span class="font-bold text-slate-900" x-text="merchant.rating.toFixed(1)"></span>
            </div>
          </div>

          <!-- Content -->
          <div class="p-3 lg:p-4 flex flex-col flex-grow">
            <!-- Business Name & Location in one line -->
            <div class="mb-2.5 lg:mb-3">
              <h3 class="font-bold text-sm lg:text-base text-slate-900 line-clamp-1 group-hover:text-purple-600 transition-colors duration-300"
                  x-text="merchant.business_name"></h3>
              <p class="text-xs text-slate-500 flex items-center gap-1 mt-0.5">
                <i class="fas fa-map-pin text-purple-600 text-xs"></i>
                <span x-text="merchant.city" class="truncate"></span>
              </p>
            </div>

            <!-- Quick Stats - Compact -->
            <div class="grid grid-cols-3 gap-1.5 mb-2.5 lg:mb-3">
              <div class="bg-gradient-to-br from-purple-50 to-white rounded-lg p-1.5 lg:p-2 text-center border border-purple-200">
                <i class="fas fa-clock text-purple-600 text-xs mb-0.5 block"></i>
                <p class="font-bold text-slate-900 text-xs" x-text="merchant.response_time"></p>
              </div>
              <div class="bg-gradient-to-br from-emerald-50 to-white rounded-lg p-1.5 lg:p-2 text-center border border-emerald-200">
                <i class="fas fa-check text-emerald-600 text-xs mb-0.5 block"></i>
                <p class="font-bold text-emerald-700 text-xs" x-text="merchant.completion_rate + '%'"></p>
              </div>
              <div class="bg-gradient-to-br from-orange-50 to-white rounded-lg p-1.5 lg:p-2 text-center border border-orange-200">
                <i class="fas fa-briefcase text-orange-600 text-xs mb-0.5 block"></i>
                <p class="font-bold text-orange-700 text-xs" x-text="merchant.services_offered.length"></p>
              </div>
            </div>

            <!-- Price -->
            <div class="mb-2.5 lg:mb-3 p-2 lg:p-2.5 bg-purple-50 rounded-lg border border-purple-200 text-center">
              <p class="text-xs lg:text-sm text-purple-700 font-bold">
                <i class="fas fa-peso-sign text-xs mr-0.5"></i><span x-text="(merchant.min_price/1000).toFixed(1) + 'k'" class="font-black"></span> - <span x-text="(merchant.max_price/1000).toFixed(1) + 'k'" class="font-black"></span>
              </p>
            </div>

            <!-- Services Tag -->
            <div class="mb-3 lg:mb-3">
              <template x-for="(service, idx) in merchant.services_offered.slice(0, 1)" :key="idx">
                <span class="inline-block bg-purple-100 text-purple-700 text-xs font-bold px-2 py-1 rounded-lg border border-purple-300 line-clamp-1"
                      x-text="service"></span>
              </template>
              <template x-if="merchant.services_offered.length > 1">
                <span class="inline-block ml-1 bg-slate-100 text-slate-700 text-xs font-bold px-2 py-1 rounded-lg border border-slate-300"
                      x-text="'+' + (merchant.services_offered.length - 1)"></span>
              </template>
            </div>

            <!-- CTA Button -->
            <button class="mt-auto w-full py-2 lg:py-2.5 bg-gradient-to-r from-purple-600 to-purple-700 hover:from-purple-700 hover:to-purple-800 text-white font-bold rounded-lg transition-all duration-300 hover:shadow-lg transform hover:scale-102 text-xs lg:text-sm flex items-center justify-center gap-1.5 shadow-md">
              <i class="fas fa-arrow-right text-xs"></i>
              <span>View</span>
            </button>
          </div>
        </a>
      </template>
    </div>

    <!-- Empty State - Premium -->
    <div x-show="!isLoading && merchants.length === 0" class="premium-card rounded-2xl lg:rounded-3xl p-10 lg:p-20 text-center border-2 border-purple-200 animate-fade-scale">
      <div class="text-7xl lg:text-9xl mb-6 lg:mb-8 inline-block text-gradient bg-gradient-to-r from-purple-300 to-purple-400 bg-clip-text text-transparent">
        <i class="fas fa-inbox"></i>
      </div>
      <h3 class="text-3xl lg:text-5xl font-black text-slate-900 mb-3 lg:mb-4 tracking-tight">Nothing Found</h3>
      <p class="text-slate-600 mb-6 lg:mb-10 text-base lg:text-lg max-w-lg mx-auto leading-relaxed font-medium">Try different filters or expand your search radius.</p>
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <button @click="resetFilters()" class="px-6 lg:px-8 py-2.5 lg:py-4 bg-gradient-to-r from-purple-600 to-purple-700 hover:from-purple-700 hover:to-purple-800 text-white font-bold rounded-lg lg:rounded-2xl transition-all hover:shadow-2xl transform hover:scale-105 flex items-center justify-center gap-2 shadow-lg text-sm lg:text-base">
          <i class="fas fa-redo text-sm lg:text-base"></i> Reset
        </button>
        <a href="{{ url_for('user.dashboard') }}" class="px-6 lg:px-8 py-2.5 lg:py-4 bg-slate-100 hover:bg-slate-200 text-slate-900 font-bold rounded-lg lg:rounded-2xl transition-all flex items-center justify-center gap-2 border-2 border-slate-300 hover:border-slate-400 text-sm lg:text-base">
          <i class="fas fa-arrow-left text-sm lg:text-base"></i> Back
        </a>
      </div>
    </div>
  </div>
</div>

<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script>
function premiumNearbyServices() {
  return {
    merchants: [],
    searchQuery: '',
    selectedService: '',
    maxDistance: '25',
    sortBy: 'distance',
    userLocation: null,
    hasLocation: false,
    locationRequested: false,
    isLoading: false,

    init() {
      console.log('Premium Nearby Services initialized');
      this.requestLocation();
    },

    requestLocation() {
      if (!navigator.geolocation) {
        console.log('Geolocation not available');
        this.fetchMerchants();
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (position) => {
          console.log('Location obtained:', position.coords);
          this.userLocation = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
          };
          this.hasLocation = true;
          this.locationRequested = true;
          this.fetchMerchants();
        },
        (error) => {
          console.log('Location error:', error);
          this.locationRequested = true;
          this.fetchMerchants();
        }
      );
    },

    skipLocation() {
      this.locationRequested = true;
      this.fetchMerchants();
    },

    async fetchMerchants() {
      this.isLoading = true;
      try {
        const payload = {
          latitude: this.userLocation?.lat || 14.5995,
          longitude: this.userLocation?.lng || 120.9842,
          max_distance: parseInt(this.maxDistance),
          search: this.searchQuery,
          service: this.selectedService,
          sort_by: this.sortBy
        };

        console.log('Fetching with:', payload);

        const response = await fetch('/user/api/merchants/nearby', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        
        if (data.success) {
          this.merchants = data.merchants;
          console.log('Loaded merchants:', this.merchants.length);
        } else {
          this.merchants = [];
        }
      } catch (error) {
        console.error('Fetch error:', error);
        this.merchants = [];
      } finally {
        this.isLoading = false;
      }
    },

    resetFilters() {
      this.searchQuery = '';
      this.selectedService = '';
      this.maxDistance = '25';
      this.sortBy = this.hasLocation ? 'distance' : 'name';
      this.fetchMerchants();
    }
  }
}
</script>
{% endblock %}
