{% extends "admin/base.html" %}

{% block title %}Partner Applications - Admin{% endblock %}

{% block content %}
<div x-data="merchantApplications()" @mount="init()" x-cloak class="min-h-screen bg-gradient-to-br from-white via-purple-50 to-white py-8 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
    <!-- Animated background elements -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute -top-1/2 -right-1/2 w-full h-full bg-purple-200 opacity-5 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-1/2 -left-1/2 w-full h-full bg-purple-100 opacity-3 rounded-full blur-3xl"></div>
    </div>
    
    <div class="max-w-7xl mx-auto relative z-10">
        <!-- Header Section -->
        <div class="mb-12">
            <div class="flex items-center gap-4 mb-3">
                <div class="p-3 bg-gradient-to-br from-purple-100 to-purple-50 backdrop-blur-xl rounded-2xl shadow-lg border border-purple-200">
                    <svg class="w-7 h-7 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="page-title">Partner Applications</h1>
                    <p class="page-subtitle">Review and manage merchant partnership applications</p>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10 stats-grid">
            <div class="bg-white backdrop-blur-xl rounded-2xl shadow-lg border border-purple-100 p-7 hover:shadow-xl transition-all">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-600 text-sm font-semibold uppercase tracking-wide">Total</p>
                        <p class="text-4xl font-bold text-gray-900 mt-3" x-text="totalStats.total">0</p>
                    </div>
                    <div class="p-4 bg-purple-100 rounded-xl">
                        <svg class="w-8 h-8 text-purple-600" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="bg-white backdrop-blur-xl rounded-2xl shadow-lg border border-purple-100 p-7 hover:shadow-xl transition-all">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-600 text-sm font-semibold uppercase tracking-wide">Pending</p>
                        <p class="text-4xl font-bold text-gray-900 mt-3" x-text="totalStats.pending">0</p>
                    </div>
                    <div class="p-4 bg-amber-100 rounded-xl">
                        <svg class="w-8 h-8 text-amber-600" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="bg-white backdrop-blur-xl rounded-2xl shadow-lg border border-purple-100 p-7 hover:shadow-xl transition-all">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-600 text-sm font-semibold uppercase tracking-wide">Approved</p>
                        <p class="text-4xl font-bold text-gray-900 mt-3" x-text="totalStats.approved">0</p>
                    </div>
                    <div class="p-4 bg-green-100 rounded-xl">
                        <svg class="w-8 h-8 text-green-600" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="bg-white backdrop-blur-xl rounded-2xl shadow-lg border border-purple-100 p-7 hover:shadow-xl transition-all">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-600 text-sm font-semibold uppercase tracking-wide">Rejected</p>
                        <p class="text-4xl font-bold text-gray-900 mt-3" x-text="totalStats.rejected">0</p>
                    </div>
                    <div class="p-4 bg-red-100 rounded-xl">
                        <svg class="w-8 h-8 text-red-600" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Search and Filter Section -->
        <div class="search-filter-card">
            <div class="flex flex-col lg:flex-row lg:items-end gap-4 lg:gap-6">
                <!-- Search Box with Icon -->
                <div class="flex-1 min-w-0">
                    <label class="block text-sm font-bold text-gray-800 mb-2.5 flex items-center gap-2">
                        <svg class="w-4 h-4 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                        <span>Search Applications</span>
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-0 bg-gradient-to-r from-purple-400/20 to-purple-600/20 rounded-xl opacity-0 group-focus-within:opacity-100 transition-opacity duration-300 blur-lg pointer-events-none"></div>
                        <input 
                            type="text" 
                            x-model="searchTerm"
                            placeholder="Search by business name, owner, ID, location..."
                            class="search-input relative"
                        >
                        <svg class="absolute right-3.5 top-1/2 -translate-y-1/2 w-5 h-5 text-purple-400 pointer-events-none transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </div>
                </div>
                
                <!-- Filter Dropdown -->
                <div class="w-full lg:w-56">
                    <label class="block text-sm font-bold text-gray-800 mb-2.5 flex items-center gap-2">
                        <svg class="w-4 h-4 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 4a1 1 0 100 2h16a1 1 0 100-2H3zM3 10a1 1 0 100 2h16a1 1 0 100-2H3zM3 16a1 1 0 100 2h16a1 1 0 100-2H3z"/>
                        </svg>
                        <span>Status</span>
                    </label>
                    <select 
                        x-model="statusFilter"
                        class="role-select w-full"
                    >
                        <option value="all">All Applications</option>
                        <option value="pending">Pending Review</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Applications Table -->
        <div x-show="!isLoading" class="applications-card">
            <div class="table-container">
                <table class="applications-table">
                    <thead>
                        <tr>
                            <th class="th-business">Business Name</th>
                            <th class="th-status">Status</th>
                            <th class="th-location">Location</th>
                            <th class="th-submitted">Submitted</th>
                            <th class="th-actions">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="(app, index) in getFilteredApplications()" :key="app.id">
                            <tr>
                                <td class="td-business" data-label="Business Name">
                                    <div class="merchant-info">
                                        <div class="merchant-logo">
                                            <template x-if="app.logo_url">
                                                <img :src="app.logo_url" alt="Logo" class="logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                                                <svg class="w-5 h-5 text-gray-400 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5.581m0 0H9m5.581 0a2 2 0 100-4 2 2 0 000 4m0 0a2 2 0 100-4 2 2 0 000 4m-6 0a2 2 0 100-4 2 2 0 000 4m0 0H4m9.581 0H9"/>
                                                </svg>
                                            </template>
                                            <template x-if="!app.logo_url">
                                                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5.581m0 0H9m5.581 0a2 2 0 100-4 2 2 0 000 4m0 0a2 2 0 100-4 2 2 0 000 4m-6 0a2 2 0 100-4 2 2 0 000 4m0 0H4m9.581 0H9"/>
                                                </svg>
                                            </template>
                                        </div>
                                        <span class="merchant-name" x-text="app.business_name"></span>
                                    </div>
                                </td>
                                <td class="td-status" data-label="Status">
                                    <span class="status-badge"
                                        :class="{
                                            'pending': app.status === 'pending',
                                            'approved': app.status === 'approved',
                                            'rejected': app.status === 'rejected'
                                        }">
                                        <span x-text="app.status.charAt(0).toUpperCase() + app.status.slice(1)"></span>
                                    </span>
                                </td>
                                <td class="td-location" data-label="Location">
                                    <span x-text="(app.city || 'N/A') + ', ' + (app.province || 'N/A')"></span>
                                </td>
                                <td class="td-submitted" data-label="Submitted">
                                    <span x-text="new Date(app.submitted_at).toLocaleDateString()"></span>
                                </td>
                                <td class="td-actions" data-label="Action">
                                    <div class="action-group">
                                        <button 
                                            @click="viewApplication(app)"
                                            class="action-btn view"
                                            title="View Details"
                                        >
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                            </svg>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <!-- Empty State -->
            <div x-show="getFilteredApplications().length === 0 && !isLoading" class="empty-state">
                <div class="empty-content">
                    <svg class="w-16 h-16 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                    </svg>
                    <p class="font-semibold text-gray-900 mb-2" x-text="applications.length === 0 ? 'No Applications Found' : 'No Matching Applications'"></p>
                    <p class="text-sm text-gray-600" x-text="applications.length === 0 ? 'There are no merchant applications yet. Merchants will appear here when they submit their applications.' : 'Try adjusting your search or filter criteria to see more results.'"></p>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <template x-if="isLoading">
            <div class="bg-white backdrop-blur-xl rounded-2xl shadow-lg border border-purple-100 p-16 text-center">
                <div class="flex flex-col items-center">
                    <div class="animate-spin rounded-full h-16 w-16 border-4 border-purple-200 border-t-purple-600 mx-auto mb-4"></div>
                    <p class="text-gray-900 font-medium">Loading applications...</p>
                    <p class="text-gray-600 text-sm mt-2">Please wait while we fetch the merchant applications from the database.</p>
                </div>
            </div>
        </template>
    </div>

    <!-- Premium Detail Modal with Glassmorphism -->
    <template x-if="selectedApp">
        <div class="fixed inset-0 bg-black/30 z-40 flex items-center justify-center p-2 sm:p-3 lg:p-4 backdrop-blur-md mt-20" @click.self="selectedApp = null">
            <div class="bg-white/80 backdrop-blur-2xl rounded-2xl sm:rounded-3xl shadow-2xl w-full max-w-3xl h-[85vh]  overflow-hidden flex flex-col border border-white/50 border-t border-t-white/80" @click.stop>
                
                <!-- Modal Header with Gradient -->
                <div class="bg-gradient-to-r from-purple-600 via-purple-700 to-purple-600 px-3 sm:px-4 py-2.5 sm:py-3 flex items-center justify-between gap-2 flex-shrink-0">
                    <div class="flex items-center gap-2 flex-1 min-w-0">
                        <!-- Merchant Logo - Enhanced -->
                        <div class="flex-shrink-0 p-1 bg-white/20 backdrop-blur-xl rounded border border-white/30 overflow-hidden shadow-lg">
                            <img 
                                :src="'/static/uploads/' + selectedApp.logo_path" 
                                alt="Merchant Logo" 
                                class="w-8 h-8 sm:w-10 sm:h-10 object-cover rounded" 
                                onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
                            >
                            <div class="w-8 h-8 sm:w-10 sm:h-10 bg-gradient-to-br from-purple-400 to-purple-600 rounded flex items-center justify-center hidden">
                                <span class="text-white font-bold text-xs sm:text-sm" x-text="selectedApp.business_name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase()"></span>
                            </div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h2 class="text-base sm:text-lg font-bold text-white break-words" x-text="selectedApp.business_name"></h2>
                            <p class="text-white/80 text-xs break-words" x-text="'ID: MC-' + selectedApp.year + '-' + selectedApp.id"></p>
                        </div>
                    </div>
                    <button 
                        @click="selectedApp = null"
                        class="text-white hover:bg-white/20 p-1.5 transition flex-shrink-0 backdrop-blur-xl"
                    >
                        <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>

                <!-- Modal Body - Scrollable Content -->
                <div class="overflow-y-auto flex-1 min-h-0">
                    <div class="p-3 sm:p-4 space-y-3 sm:space-y-4">
                        
                        <!-- Quick Status Bar -->
                        <div class="bg-gradient-to-r from-purple-50 to-purple-100/50 backdrop-blur-lg border border-purple-200 rounded-lg sm:rounded-xl p-3 sm:p-4 shadow-sm">
                            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 sm:gap-4">
                                <div>
                                    <p class="text-gray-600 text-xs font-semibold uppercase tracking-wide">Status</p>
                                    <p class="text-gray-900 font-bold text-sm mt-1.5 flex items-center gap-1">
                                        <span :class="{'bg-amber-100 text-amber-700': selectedApp.status === 'pending', 'bg-green-100 text-green-700': selectedApp.status === 'approved', 'bg-red-100 text-red-700': selectedApp.status === 'rejected'}" class="px-2.5 py-0.5 rounded-full text-xs font-bold" x-text="selectedApp.status.charAt(0).toUpperCase() + selectedApp.status.slice(1)"></span>
                                    </p>
                                </div>
                                <div>
                                    <p class="text-gray-600 text-xs font-semibold uppercase tracking-wide">Category</p>
                                    <p class="text-gray-900 font-bold text-sm mt-1.5 break-words" x-text="selectedApp.business_category || selectedApp.business_type || 'N/A'"></p>
                                </div>
                                <div>
                                    <p class="text-gray-600 text-xs font-semibold uppercase tracking-wide">Year</p>
                                    <p class="text-gray-900 font-bold text-sm mt-1.5" x-text="selectedApp.year"></p>
                                </div>
                                <div>
                                    <p class="text-gray-600 text-xs font-semibold uppercase tracking-wide">Verified</p>
                                    <p class="text-gray-900 font-bold text-sm mt-1.5">
                                        <span x-show="selectedApp.is_verified" class="text-green-600">✓ Yes</span>
                                        <span x-show="!selectedApp.is_verified" class="text-gray-500">✗ No</span>
                                    </p>
                                </div>
                            </div>
                        </div>

                        <!-- Business Information Section -->
                        <div class="bg-white/60 backdrop-blur-lg border border-purple-100 rounded-lg sm:rounded-xl p-3 sm:p-4 shadow-sm">
                            <h4 class="font-bold text-gray-900 text-sm mb-3 flex items-center gap-2 pb-2 border-b border-purple-200">
                                <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5.581m0 0H9m5.581 0a2 2 0 100-4 2 2 0 000 4m0 0a2 2 0 100-4 2 2 0 000 4m-6 0a2 2 0 100-4 2 2 0 000 4m0 0H4m9.581 0H9"/>
                                </svg>
                                Business Information
                            </h4>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
                                <div>
                                    <p class="text-gray-600 font-semibold uppercase text-xs">Owner/Manager Name</p>
                                    <p class="text-gray-900 font-medium mt-1" x-text="selectedApp.owner_name || 'N/A'"></p>
                                </div>
                                <div class="sm:col-span-2">
                                    <p class="text-gray-600 font-semibold uppercase text-xs">Business Description</p>
                                    <p class="text-gray-900 font-medium mt-1 break-words" x-text="selectedApp.business_description || 'Not provided'"></p>
                                </div>
                            </div>
                        </div>

                        <!-- Contact Information Section -->
                        <div class="bg-white/60 backdrop-blur-lg border border-purple-100 rounded-xl sm:rounded-2xl p-4 sm:p-5 shadow-sm">
                            <h4 class="font-bold text-gray-900 text-base mb-4 flex items-center gap-2 pb-3 border-b border-purple-200">
                                <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                                </svg>
                                Contact Information
                            </h4>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
                                <div>
                                    <p class="text-gray-600 font-semibold uppercase text-xs">Contact Email</p>
                                    <p class="text-blue-600 font-medium mt-1 break-all" x-text="selectedApp.contact_email"></p>
                                </div>
                                <div>
                                    <p class="text-gray-600 font-semibold uppercase text-xs">User Email</p>
                                    <p class="text-blue-600 font-medium mt-1 break-all" x-text="selectedApp.user_email"></p>
                                </div>
                                <div>
                                    <p class="text-gray-600 font-semibold uppercase text-xs">Phone Number</p>
                                    <p class="text-gray-900 font-medium mt-1" x-text="selectedApp.phone"></p>
                                </div>
                                <div>
                                    <p class="text-gray-600 font-semibold uppercase text-xs">User Name</p>
                                    <p class="text-gray-900 font-medium mt-1" x-text="selectedApp.user_name"></p>
                                </div>
                            </div>
                        </div>

                        <!-- Location Information Section -->
                        <div class="bg-white/60 backdrop-blur-lg border border-purple-100 rounded-xl sm:rounded-2xl p-4 sm:p-5 shadow-sm">
                            <h4 class="font-bold text-gray-900 text-base mb-4 flex items-center gap-2 pb-3 border-b border-purple-200">
                                <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                </svg>
                                Location Information
                            </h4>
                            <div class="space-y-3 text-sm">
                                <div>
                                    <p class="text-gray-600 font-semibold uppercase text-xs">Full Address</p>
                                    <p class="text-gray-900 font-medium mt-1 break-words" x-text="selectedApp.full_address"></p>
                                </div>
                                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                                    <div>
                                        <p class="text-gray-600 font-semibold uppercase text-xs">City</p>
                                        <p class="text-gray-900 font-medium mt-1" x-text="selectedApp.city"></p>
                                    </div>
                                    <div>
                                        <p class="text-gray-600 font-semibold uppercase text-xs">Province</p>
                                        <p class="text-gray-900 font-medium mt-1" x-text="selectedApp.province"></p>
                                    </div>
                                    <div>
                                        <p class="text-gray-600 font-semibold uppercase text-xs">Barangay</p>
                                        <p class="text-gray-900 font-medium mt-1" x-text="selectedApp.barangay"></p>
                                    </div>
                                    <div>
                                        <p class="text-gray-600 font-semibold uppercase text-xs">Postal Code</p>
                                        <p class="text-gray-900 font-medium mt-1" x-text="selectedApp.postal_code"></p>
                                    </div>
                                </div>
                                <template x-if="selectedApp.latitude && selectedApp.longitude">
                                    <div class="grid grid-cols-2 gap-3 pt-2 border-t border-purple-200">
                                        <div>
                                            <p class="text-gray-600 font-semibold uppercase text-xs">Latitude</p>
                                            <p class="text-gray-900 font-medium mt-1 font-mono text-xs" x-text="selectedApp.latitude.toFixed(6)"></p>
                                        </div>
                                        <div>
                                            <p class="text-gray-600 font-semibold uppercase text-xs">Longitude</p>
                                            <p class="text-gray-900 font-medium mt-1 font-mono text-xs" x-text="selectedApp.longitude.toFixed(6)"></p>
                                        </div>
                                    </div>
                                </template>
                                <template x-if="selectedApp.google_maps_link">
                                    <div>
                                        <p class="text-gray-600 font-semibold uppercase text-xs">Google Maps</p>

                            rounded-xl 
                            transition-all duration-200

                        <span x-show="confirmAction === 'approve'">Approve</span>
                        <span x-show="confirmAction === 'reject'">Reject</span>

    <!-- Photos Gallery Modal (Soft Rounded + Glassmorphism) -->
    <template x-if="showPhotosModal && currentPhotoIndex !== null">
        <div class="fixed inset-0 bg-black/70 z-[70] flex items-center justify-center p-2 sm:p-4 backdrop-blur-md" @click.self="showPhotosModal = false">
            <div class="bg-white/90 backdrop-blur-xl shadow-2xl max-w-2xl w-full border border-purple-100 rounded-2xl sm:rounded-3xl overflow-hidden" @click.stop>

                <!-- Gallery Header -->
                <div class="bg-gradient-to-r from-purple-600/90 to-purple-700/90 px-4 sm:px-6 py-4 sm:py-6 flex items-center justify-between gap-4 rounded-t-2xl sm:rounded-t-3xl">
                    <h3 class="text-base sm:text-xl font-bold text-white"
                        x-text="'Photo ' + (currentPhotoIndex + 1) + ' of ' + selectedApp.facility_photos_paths.length"></h3>

                    <button @click="showPhotosModal = false"
                        class="text-white hover:bg-white/20 p-2 rounded-full transition flex-shrink-0">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>

                <!-- Gallery Content -->
                <div class="p-4 sm:p-6">
                    <div class="bg-gray-100/80 backdrop-blur aspect-video flex items-center justify-center overflow-hidden mb-4 rounded-2xl">
                        <img 
                            :src="'/static/uploads/' + selectedApp.facility_photos_paths[currentPhotoIndex]"
                            alt="Facility Photo"
                            class="w-full h-full object-contain rounded-xl"
                        >
                    </div>
                </div>

                <!-- Gallery Footer with Navigation -->
                <div class="border-t border-purple-100 px-4 sm:px-6 py-3 sm:py-4 flex gap-2 sm:gap-3 items-center justify-between bg-white/80 backdrop-blur rounded-b-2xl sm:rounded-b-3xl">

                    <button 
                        @click="currentPhotoIndex = currentPhotoIndex === 0 ? selectedApp.facility_photos_paths.length - 1 : currentPhotoIndex - 1"
                        class="px-4 py-2 bg-gray-200/80 hover:bg-gray-300/90 text-gray-900 font-semibold text-xs sm:text-sm transition-all rounded-full shadow-sm hover:shadow-md"
                    >
                        ← Previous
                    </button>

                    <div class="flex gap-2">
                        <template x-for="(photo, idx) in selectedApp.facility_photos_paths" :key="idx">
                            <button 
                                @click="currentPhotoIndex = idx"
                                :class="{
                                    'bg-purple-600 w-3 h-3': currentPhotoIndex === idx,
                                    'bg-gray-300 w-2 h-2': currentPhotoIndex !== idx
                                }"
                                class="rounded-full transition-all hover:scale-125"
                            ></button>
                        </template>
                    </div>

                    <button 
                        @click="currentPhotoIndex = currentPhotoIndex === selectedApp.facility_photos_paths.length - 1 ? 0 : currentPhotoIndex + 1"
                        class="px-4 py-2 bg-gray-200/80 hover:bg-gray-300/90 text-gray-900 font-semibold text-xs sm:text-sm transition-all rounded-full shadow-sm hover:shadow-md"
                    >
                        Next →
                    </button>

                </div>
            </div>
        </div>
    </template>

</div>

<script>
// Get CSRF token from Flask
function getCSRFToken() {
    // Try to get from meta tag first (if available)
    const token = document.querySelector('meta[name="csrf-token"]');
    if (token) return token.getAttribute('content');
    
    // Fallback: try to get from cookie
    const name = 'csrf_token';
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

function merchantApplications() {
    return {
        // Initialize all reactive properties with safe defaults
        applications: [],
        filteredApplications: [],
        selectedApp: null,
        searchTerm: '',
        statusFilter: 'all',
        isLoading: true,
        showConfirmModal: false,
        confirmAction: null,
        confirmTitle: '',
        confirmMessage: '',
        confirmMerchantId: null,
        rejectionReason: '',
        showPhotosModal: false,
        currentPhotoIndex: null,
        totalStats: {
            total: 0,
            pending: 0,
            approved: 0,
            rejected: 0
        },

        init() {
            try {
                console.log('🟢 Initializing merchant applications component');
                console.log('Alpine version:', typeof Alpine);
                
                // Initialize data
                this.applications = [];
                this.filteredApplications = [];
                this.totalStats = {
                    total: 0,
                    pending: 0,
                    approved: 0,
                    rejected: 0
                };
                
                // Watch for search/filter changes
                this.$watch('searchTerm', () => {
                    console.log('🔍 Search term changed:', this.searchTerm);
                    this.filterApplications();
                });
                this.$watch('statusFilter', () => {
                    console.log('🔽 Status filter changed:', this.statusFilter);
                    this.filterApplications();
                });
                
                console.log('🟡 Starting loadApplications...');
                this.loadApplications();
            } catch (error) {
                console.error('❌ Error in init():', error);
            }
        },

        confirmApprove(merchantId) {
            this.showConfirmModal = true;
            this.confirmAction = 'approve';
            this.confirmTitle = 'Approve Application?';
            this.confirmMessage = 'Are you sure you want to approve this merchant application? This action cannot be undone.';
            this.confirmMerchantId = merchantId;
        },

        confirmReject(merchantId) {
            this.showConfirmModal = true;
            this.confirmAction = 'reject';
            this.confirmTitle = 'Reject Application?';
            this.confirmMessage = 'Are you sure you want to reject this merchant application?';
            this.confirmMerchantId = merchantId;
        },

        async executeConfirmedAction() {
            if (this.confirmAction === 'approve') {
                await this.approveApplication(this.confirmMerchantId);
            } else if (this.confirmAction === 'reject') {
                await this.rejectApplication(this.confirmMerchantId, this.rejectionReason);
            }
            this.showConfirmModal = false;
            this.confirmAction = null;
            this.confirmMerchantId = null;
        },

        cancelConfirm() {
            this.showConfirmModal = false;
            this.confirmAction = null;
            this.confirmMerchantId = null;
            this.rejectionReason = '';
        },

        async loadApplications() {
            this.isLoading = true;
            console.log('🟡 LoadApplications starting...');
            try {
                console.log('📡 Fetching merchants from API: /admin/api/merchants?status=all');
                const response = await fetch('/admin/api/merchants?status=all');
                
                console.log('✅ API Response status:', response.status);
                console.log('📋 Response headers:', response.headers.get('content-type'));
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('❌ HTTP Error:', response.status, errorText);
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('📦 Parsed JSON data:', data);
                
                if (data.error) {
                    console.error('❌ API Error:', data.error);
                    alert('Error loading applications: ' + data.error);
                    this.applications = [];
                    this.updateStats();
                    this.isLoading = false;
                    return;
                }
                
                const merchants = data.merchants || [];
                console.log(`✅ Loaded ${merchants.length} merchants from API`);
                
                if (merchants.length === 0) {
                    console.warn('⚠️ No merchants returned from API - database might be empty');
                    this.applications = [];
                    this.updateStats();
                    this.filterApplications();
                    this.isLoading = false;
                    return;
                }
                
                console.log('🔄 Processing merchants...');
                
                // Normalize field names to match template expectations
                this.applications = merchants.map((m, idx) => {
                    console.log(`Processing merchant ${idx + 1}/${merchants.length}:`, {
                        id: m.id,
                        name: m.business_name,
                        status: m.application_status,
                        submitted: m.submitted_at
                    });
                    
                    return {
                        id: m.id,
                        year: m.created_at ? m.created_at.split('T')[0].split('-')[0] : 'N/A',
                        business_name: m.business_name || 'N/A',
                        business_category: m.business_category || 'N/A',
                        business_type: m.business_category || 'N/A',
                        owner_name: m.owner_manager_name || 'N/A',
                        contact_email: m.contact_email || 'N/A',
                        user_email: m.user_email || 'N/A',
                        user_name: m.user_name || 'N/A',
                        phone: m.contact_phone || 'N/A',
                        city: m.city || 'N/A',
                        province: m.province || 'N/A',
                        barangay: m.barangay || 'N/A',
                        postal_code: m.postal_code || 'N/A',
                        full_address: m.full_address || 'N/A',
                        services: Array.isArray(m.services_offered) ? m.services_offered : (m.services_offered ? [m.services_offered] : []),
                        pets_accepted: Array.isArray(m.pets_accepted) ? m.pets_accepted : (m.pets_accepted ? [m.pets_accepted] : []),
                        service_pricing: m.service_pricing || {},
                        cancellation_policy: m.cancellation_policy || '',
                        government_id_path: m.government_id_path || '',
                        business_permit_path: m.business_permit_path || '',
                        facility_photos_paths: Array.isArray(m.facility_photos_paths) ? m.facility_photos_paths : (m.facility_photos_paths ? [m.facility_photos_paths] : []),
                        submitted_at: m.submitted_at ? new Date(m.submitted_at).toISOString() : new Date().toISOString(),
                        rejection_reason: m.rejection_reason || '',
                        years_in_operation: m.years_in_operation || 0,
                        status: m.application_status || 'pending',
                        business_description: m.business_description || '',
                        opening_time: m.opening_time || 'N/A',
                        closing_time: m.closing_time || 'N/A',
                        operating_days: Array.isArray(m.operating_days) ? m.operating_days : (m.operating_days ? [m.operating_days] : []),
                        google_maps_link: m.google_maps_link || '',
                        logo_url: m.logo_path ? '/static/uploads/' + m.logo_path : '',
                        logo_path: m.logo_path || '',
                        latitude: m.latitude || null,
                        longitude: m.longitude || null,
                        is_verified: m.is_verified || false,
                        reviewed_at: m.reviewed_at || null,
                        created_at: m.created_at || new Date().toISOString(),
                        updated_at: m.updated_at || new Date().toISOString()
                    };
                });
                
                console.log(`✅ Successfully processed ${this.applications.length} applications`);
                console.log('📊 Processed applications:', this.applications);
                
                this.updateStats();
                this.filterApplications();
            } catch (error) {
                console.error('❌ Error loading applications:', error);
                console.error('Stack trace:', error.stack);
                alert('Failed to load applications. Please check the console for errors. Error: ' + error.message);
                this.applications = [];
                this.updateStats();
            } finally {
                console.log('✅ LoadApplications complete');
                this.isLoading = false;
            }
        },

        updateStats() {
            this.totalStats = {
                total: this.applications.length,
                pending: this.applications.filter(a => a.status === 'pending').length,
                approved: this.applications.filter(a => a.status === 'approved').length,
                rejected: this.applications.filter(a => a.status === 'rejected').length
            };
            console.log('Stats updated:', this.totalStats);
        },

        filterApplications() {
            console.log('Filtering applications with:', {
                statusFilter: this.statusFilter,
                searchTerm: this.searchTerm,
                totalApplications: this.applications.length
            });
            
            this.filteredApplications = this.applications.filter(app => {
                const matchesStatus = this.statusFilter === 'all' || app.status === this.statusFilter;
                const searchLower = this.searchTerm.toLowerCase();
                const matchesSearch = !this.searchTerm || 
                    (app.business_name && app.business_name.toLowerCase().includes(searchLower)) ||
                    (app.owner_name && app.owner_name.toLowerCase().includes(searchLower)) ||
                    (app.user_name && app.user_name.toLowerCase().includes(searchLower)) ||
                    (app.contact_email && app.contact_email.toLowerCase().includes(searchLower)) ||
                    (app.user_email && app.user_email.toLowerCase().includes(searchLower)) ||
                    (app.phone && app.phone.toLowerCase().includes(searchLower)) ||
                    (app.city && app.city.toLowerCase().includes(searchLower)) ||
                    (app.province && app.province.toLowerCase().includes(searchLower)) ||
                    (app.barangay && app.barangay.toLowerCase().includes(searchLower)) ||
                    app.id.toString().includes(searchLower);
                
                return matchesStatus && matchesSearch;
            });
            
            console.log('Filtered results:', this.filteredApplications.length, 'items');
            console.log('Filtered applications:', this.filteredApplications);
        },

        getFilteredApplications() {
            this.filterApplications();
            console.log('Returning filtered applications:', this.filteredApplications.length);
            return this.filteredApplications;
        },

        viewApplication(app) {
            this.selectedApp = app;
            this.rejectionReason = '';
        },

        formatTime12Hr(time24hr) {
            if (!time24hr || time24hr === 'N/A') return 'N/A';
            try {
                const [hours, minutes] = time24hr.split(':');
                const hour = parseInt(hours);
                const minute = minutes || '00';
                const period = hour >= 12 ? 'PM' : 'AM';
                const hour12 = hour % 12 || 12;
                return `${hour12}:${minute} ${period}`;
            } catch (e) {
                return time24hr;
            }
        },

        capitalizeFirst(str) {
            if (!str) return '';
            return str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
        },

        formatPriceDisplay(priceData) {
            // Handle number
            if (typeof priceData === 'number') {
                return '₱ ' + priceData.toLocaleString('en-PH', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
            }
            
            // Handle string
            if (typeof priceData === 'string') {
                return '₱ ' + priceData;
            }
            
            // Handle object
            if (typeof priceData === 'object' && priceData !== null) {
                // Check for min_price and max_price
                if (priceData.min_price && priceData.max_price) {
                    const minPrice = parseFloat(priceData.min_price).toLocaleString('en-PH', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
                    const maxPrice = parseFloat(priceData.max_price).toLocaleString('en-PH', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
                    return `₱ ${minPrice} - ₱ ${maxPrice}`;
                }
                
                // Check for single price property
                if (priceData.price) {
                    return '₱ ' + parseFloat(priceData.price).toLocaleString('en-PH', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
                }
                
                // Check for amount property
                if (priceData.amount) {
                    return '₱ ' + parseFloat(priceData.amount).toLocaleString('en-PH', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
                }
                
                // Fallback: show as "Price range" if has multiple numeric fields
                const numericValues = Object.values(priceData).filter(v => typeof v === 'number' || !isNaN(parseFloat(v)));
                if (numericValues.length > 0) {
                    return '₱ ' + numericValues.map(v => parseFloat(v).toLocaleString('en-PH', { minimumFractionDigits: 0, maximumFractionDigits: 2 })).join(' / ₱ ');
                }
            }
            
            return '₱ -';
        },

        openPhotosGallery() {
            this.showPhotosModal = true;
            this.currentPhotoIndex = 0;
        },

        async approveApplication(merchantId) {
            try {
                console.log('Approving merchant:', merchantId);
                const response = await fetch(`/admin/api/merchants/${merchantId}/approve`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCSRFToken()
                    }
                });

                console.log('Approve response status:', response.status);
                console.log('Response content type:', response.headers.get('content-type'));

                // Check if response is JSON
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    console.error('Response is not JSON, received:', await response.text());
                    alert('Server error: Invalid response format. Please check your permissions.');
                    return;
                }

                const data = await response.json();
                console.log('Approval response data:', data);

                if (response.ok && data.success) {
                    console.log('Application approved successfully');
                    this.selectedApp = null;
                    // Redirect to show flash message
                    setTimeout(() => {
                        window.location.href = '/admin/merchants/applications';
                    }, 500);
                } else {
                    console.error('Approval error:', data);
                    alert(`Error: ${data.message || 'Failed to approve application'}`);
                }
            } catch (error) {
                console.error('Error approving application:', error);
                alert('An error occurred while approving the application: ' + error.message);
            }
        },

        async rejectApplication(merchantId, reason) {
            if (!reason.trim()) {
                alert('Please provide a reason for rejection.');
                return;
            }

            try {
                console.log('Rejecting merchant:', merchantId, 'Reason:', reason);
                const response = await fetch(`/admin/api/merchants/${merchantId}/reject`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCSRFToken()
                    },
                    body: JSON.stringify({ reason: reason.trim() })
                });

                console.log('Reject response status:', response.status);
                console.log('Response content type:', response.headers.get('content-type'));

                // Check if response is JSON
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    console.error('Response is not JSON, received:', await response.text());
                    alert('Server error: Invalid response format. Please check your permissions.');
                    return;
                }

                const data = await response.json();
                console.log('Rejection response data:', data);

                if (response.ok && data.success) {
                    console.log('Application rejected successfully');
                    this.selectedApp = null;
                    this.rejectionReason = '';
                    // Redirect to show flash message
                    setTimeout(() => {
                        window.location.href = '/admin/merchants/applications';
                    }, 500);
                } else {
                    console.error('Rejection error:', data);
                    alert(`Error: ${data.message || 'Failed to reject application'}`);
                }
            } catch (error) {
                console.error('Error rejecting application:', error);
                alert('An error occurred while rejecting the application: ' + error.message);
            }
        }
    };
}
</script>
