<!-- Notification Detail Modal -->
<div class="modal fade" id="notificationModal" tabindex="-1" aria-labelledby="notificationModalLabel" aria-hidden="true" data-backdrop="static" data-keyboard="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 500px;">
        <div class="modal-content" style="border: none; border-radius: 12px; box-shadow: 0 20px 60px rgba(102, 126, 234, 0.15); background: white; overflow: hidden;">
            
            <!-- Modal Header - Simple Close Button Only -->
            <div style="padding: 15px 20px; border-bottom: 1px solid rgba(0,0,0,0.08); display: flex; justify-content: flex-end;">
                <button type="button" class="modal-close close-notif-modal" aria-label="Close" style="background: rgba(102, 126, 234, 0.1); border: 1px solid rgba(102, 126, 234, 0.15); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: #667eea; cursor: pointer; padding: 0; transition: all 0.2s ease;">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <!-- Modal Body - Simple Layout -->
            <div class="modal-body" style="padding: 25px;">
                
                <!-- Title and Type in Same Row -->
                <div style="display: flex; align-items: flex-start; gap: 12px; margin-bottom: 15px;">
                    <div style="flex: 1;">
                        <p id="notifModalTitle" style="margin: 0; font-size: 1.15rem; font-weight: 700; color: #333;">Notification Title</p>
                    </div>
                    <span id="notifModalType" style="background: #e8eaf6; color: #667eea; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; white-space: nowrap; flex-shrink: 0;">notification</span>
                </div>

                <!-- Message -->
                <div style="margin-bottom: 15px;">
                    <p id="notifModalMessage" style="margin: 0; color: #555; font-size: 0.95rem; line-height: 1.6; white-space: normal; word-wrap: break-word;">Notification message goes here...</p>
                </div>

                <!-- Timestamp -->
                <div style="margin-bottom: 0;">
                    <p style="margin: 0; font-size: 0.85rem; color: #999;">
                        <i class="fas fa-clock" style="margin-right: 6px;"></i>
                        <span id="notifModalDateFull">February 25, 2026 at 10:30 AM</span>
                    </p>
                </div>

                <!-- Read At Info (hidden by default) -->
                <div id="notifReadAtBlock" style="display: none; margin-top: 10px;">
                    <p style="margin: 0; font-size: 0.85rem; color: #28a745;">
                        <i class="fas fa-check-double" style="margin-right: 6px;"></i>
                        Read on <span id="notifModalReadAt">-</span>
                    </p>
                </div>

            </div>

            <!-- Modal Footer - Close and Mark as Read -->
            <div style="padding: 15px 20px; border-top: 1px solid rgba(0,0,0,0.08); display: flex; gap: 12px; justify-content: flex-end;">
                <button type="button" id="notifCloseBtn" class="btn" style="flex: 1; background: rgba(102, 126, 234, 0.1); color: #667eea; border: 1px solid rgba(102, 126, 234, 0.15); padding: 10px 16px; border-radius: 6px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; white-space: nowrap;">
                    <i class="fas fa-times"></i> Close
                </button>
                <button type="button" id="notificationMarkReadBtn" class="btn" style="flex: 1; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 10px 16px; border-radius: 6px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; white-space: nowrap;">
                    <i class="fas fa-check"></i> Mark as Read
                </button>
            </div>

        </div>
    </div>
</div>


<!-- Confirmation Modal for Delete All -->
<div class="modal fade" id="deleteAllNotificationsModal" tabindex="-1" aria-labelledby="deleteAllNotificationsLabel" aria-hidden="true" data-backdrop="static" data-keyboard="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 380px;">
        <div style="border: none; border-radius: 12px; box-shadow: 0 20px 60px rgba(102, 126, 234, 0.2); background: white; overflow: hidden;">
            <div style="padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: space-between;">
                <h5 style="margin: 0; font-size: 1rem; font-weight: 700; color: #333; display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-trash-alt" style="color: #ef4444;"></i>
                    Delete All Notifications
                </h5>
                <button type="button" class="modal-close close-delete-all-modal" aria-label="Close" style="background: rgba(102, 126, 234, 0.1); border: 1px solid rgba(102, 126, 234, 0.15); width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: #667eea; cursor: pointer; padding: 0; transition: all 0.2s ease;">
                    <i class="fas fa-times" style="font-size: 0.9rem;"></i>
                </button>
            </div>
            <div style="padding: 20px;">
                <p style="color: #666; margin: 0; font-size: 0.95rem; line-height: 1.5;">Are you sure you want to delete all notifications? This action cannot be undone.</p>
            </div>
            <div style="padding: 15px 20px; border-top: 1px solid rgba(0,0,0,0.08); display: flex; gap: 10px; justify-content: flex-end;">
                <button type="button" class="btn close-delete-all-modal" style="flex: 1; background: rgba(0,0,0,0.05); color: #333; border: 1px solid rgba(0,0,0,0.1); padding: 10px 16px; border-radius: 6px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease;">
                    Cancel
                </button>
                <button type="button" id="confirmDeleteAllNotifBtn" style="flex: 1; background: #ef4444; color: white; border: none; padding: 10px 16px; border-radius: 6px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease;">
                    <i class="fas fa-trash-alt"></i> Delete All
                </button>
            </div>
        </div>
    </div>
</div>

<style>
/* Modal Backdrop with Blur Effect */
.modal-backdrop {
    background-color: rgba(0, 0, 0, 0.3) !important;
    backdrop-filter: blur(4px) !important;
    -webkit-backdrop-filter: blur(4px) !important;
}

.modal.show .modal-backdrop {
    opacity: 1 !important;
}

/* Main Notification Modal */
#notificationModal .modal-dialog {
    animation: slideIn 0.3s ease forwards;
}

@keyframes slideIn {
    from {
        transform: translateY(-30px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

/* Close Button Hover */
.modal-close:hover {
    background: rgba(102, 126, 234, 0.2) !important;
    border-color: rgba(102, 126, 234, 0.25) !important;
    transform: rotate(90deg);
}

/* Button Hover States */
#notifCloseBtn:hover {
    background: rgba(102, 126, 234, 0.2) !important;
    color: #4c51bf !important;
}

#notificationMarkReadBtn:hover {
    background: linear-gradient(135deg, #764ba2 0%, #667eea 100%) !important;
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3) !important;
}

/* Avatar image must be visible */
#notifSenderAvatarImg {
    display: block !important;
    visibility: visible !important;
    opacity: 1 !important;
}

/* Responsive Design */
@media (max-width: 576px) {
    .modal-dialog {
        margin: 10px !important;
    }
    
    #notificationModal .modal-dialog {
        max-width: calc(100% - 20px) !important;
    }
    
    .modal-body {
        padding: 20px !important;
    }
}
</style>

<script>
// DEBUG: Log when modal is shown
document.getElementById('notificationModal')?.addEventListener('show.bs.modal', function() {
    console.log('\n🔔 NOTIFICATION MODAL OPENED');
    setTimeout(() => {
        const avatarImg = document.getElementById('notifSenderAvatarImg');
        const senderName = document.getElementById('notifSenderName');        
        console.log('🖼️ Avatar image src:', avatarImg?.src);
        console.log('👤 Sender name text:', senderName?.textContent);
        console.log('🖼️ Avatar visible:', window.getComputedStyle(avatarImg).display);
        console.log('🖼️ Parent visible:', window.getComputedStyle(avatarImg.parentElement).display);
    }, 100);
});

document.addEventListener('DOMContentLoaded', function() {
    // ===== MAIN NOTIFICATION MODAL CLOSE =====
    const closeNotifButtons = document.querySelectorAll('#notificationModal .close-notif-modal, #notificationModal #notifCloseBtn');
    const notificationModal = document.getElementById('notificationModal');

    if (notificationModal) {
        closeNotifButtons.forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                $(notificationModal).modal('hide');
            });
        });
        // Close on ESC key
        notificationModal.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                $(notificationModal).modal('hide');
            }
        });
    }
});
</script>
